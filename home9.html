<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Yard Game Rentals</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<!-- Hero Section -->
<header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-20 text-center">
  <h1 class="text-4xl md:text-5xl font-bold mb-4">Premium Yard Game Rentals</h1>
  <p class="text-lg md:text-xl">Pick your games and select the dates for your next event!</p>
</header>

<div class="container mx-auto px-4 py-10">

  <!-- Game Selection -->
  <section class="mb-12">
    <h2 class="text-2xl font-semibold mb-6 text-gray-700">Select Your Games</h2>
    <div id="games-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      Loading games...
    </div>
  </section>

  <!-- Calendar Section -->
  <section class="mb-12">
    <div class="flex justify-between items-center mb-4">
      <button id="prevMonth" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition">Previous Month</button>
      <h2 id="calendarMonth" class="text-xl font-semibold text-gray-700"></h2>
      <button id="nextMonth" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition">Next Month</button>
    </div>

    <div class="grid grid-cols-7 text-center font-semibold text-gray-600 mb-2">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    <div id="calendar" class="grid grid-cols-7 gap-2"></div>
  </section>

  <!-- Selection Summary -->
  <section>
    <h2 class="text-2xl font-semibold mb-4 text-gray-700">Your Selection</h2>
    <div id="selection" class="bg-white p-4 rounded shadow mb-4 whitespace-pre-wrap font-mono">None</div>
    <button id="submitBtn" class="w-full max-w-xs mx-auto block bg-green-600 text-white py-3 rounded shadow hover:bg-green-700 transition disabled:bg-gray-300 disabled:cursor-not-allowed" disabled>Request Rental</button>
  </section>

</div>

<script>
// --- Inventory & State ---
let inventory = {};
let selectedGames = {}; // key = game-date
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

// Fetch inventory.json
fetch('inventory.json')
  .then(res => res.json())
  .then(data => {
    inventory = data;
    renderGames();
    renderCalendar();
  })
  .catch(err => console.error(err));

// --- Render Game Cards ---
function renderGames(){
  const container = document.getElementById('games-container');
  container.innerHTML = '';
  Object.keys(inventory).forEach(game=>{
    const card = document.createElement('div');
    card.className = 'bg-white rounded-lg shadow p-4 cursor-pointer hover:shadow-lg transition relative';
    card.innerHTML = `
      <img src="https://via.placeholder.com/250x150?text=${encodeURIComponent(game)}" class="rounded mb-2">
      <h3 class="text-lg font-semibold text-gray-700">${game}</h3>
    `;
    card.addEventListener('click', () => {
      card.classList.toggle('ring-4');
      card.classList.toggle('ring-blue-500');
    });
    container.appendChild(card);
  });
}

// --- Render Calendar ---
function renderCalendar(){
  const calendar = document.getElementById('calendar');
  calendar.innerHTML = '';
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  document.getElementById('calendarMonth').textContent = `${monthNames[currentMonth]} ${currentYear}`;

  const firstDay = new Date(currentYear,currentMonth,1).getDay();
  const daysInMonth = new Date(currentYear,currentMonth+1,0).getDate();

  // Empty cells for alignment
  for(let i=0;i<firstDay;i++){ calendar.appendChild(document.createElement('div')); }

  for(let day=1;day<=daysInMonth;day++){
    const dateStr=new Date(currentYear,currentMonth,day).toISOString().split('T')[0];
    const dayDiv=document.createElement('div');
    dayDiv.className='p-3 rounded cursor-pointer bg-white hover:bg-blue-50 shadow relative';
    dayDiv.textContent=day;

    // Check availability per game
    let availableGames=[];
    Object.keys(inventory).forEach(game=>{
      const booked = inventory[game].bookings.filter(b=>dateStr>=b.start && dateStr<=b.end).length;
      const avail = inventory[game].quantity - booked;
      if(avail>0) availableGames.push(`${game}:${avail}`);
    });

    if(availableGames.length===0) dayDiv.classList.add('bg-red-400','text-white','cursor-not-allowed');
    else{
      const span=document.createElement('span');
      span.className='absolute bottom-1 right-1 text-xs text-gray-700';
      span.textContent = availableGames.join(' ');
      dayDiv.appendChild(span);
    }

    // Click to select multiple games
    dayDiv.addEventListener('click', ()=>{
      if(dayDiv.classList.contains('cursor-not-allowed')) return;
      document.querySelectorAll('.game-card.ring-4').forEach(card=>{
        const game = card.querySelector('h3').textContent;
        const key = `${game}-${dateStr}`;
        if(selectedGames[key]) delete selectedGames[key];
        else selectedGames[key]={game,date:dateStr};
      });
      renderCalendar();
      updateSelection();
    });

    // Highlight selected
    Object.keys(selectedGames).forEach(k=>{
      if(k.endsWith(dateStr)) dayDiv.classList.add('bg-green-400','text-white');
    });

    calendar.appendChild(dayDiv);
  }
}

// --- Month Navigation ---
document.getElementById('prevMonth').addEventListener('click',()=>{
  currentMonth--;
  if(currentMonth<0){currentMonth=11; currentYear--;}
  renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click',()=>{
  currentMonth++;
  if(currentMonth>11){currentMonth=0; currentYear++;}
  renderCalendar();
});

// --- Update Selection ---
function updateSelection(){
  const selDiv=document.getElementById('selection');
  const arr=Object.values(selectedGames).map(s=>`${s.game} on ${s.date}`);
  selDiv.textContent = arr.length?arr.join('\n'):'None';
  document.getElementById('submitBtn').disabled = arr.length===0;
}

// --- Submit ---
document.getElementById('submitBtn').addEventListener('click',()=>{
  alert('Rental request submitted! Manually confirm and mark booked dates in inventory.json.');
});
</script>

</body>
</html>
