<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catch the Download Button!</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #4f46e5, #3b82f6);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }

  #container {
    position: relative;
    width: 100%;
    height: 100%;
  }

  #downloadBtn {
    position: absolute;
    padding: 15px 30px;
    font-size: 18px;
    color: white;
    background: linear-gradient(90deg, #10b981, #14b8a6);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
  }

  #downloadBtn:hover {
    transform: scale(1.1);
  }

  #message {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 1.2rem;
    color: #fff;
  }
</style>
</head>
<body>
<div id="container">
  <div id="message">Click the button to download the Beginner Fitness Habit Tracker!</div>
  <button id="downloadBtn">Click Me!</button>
</div>

<script>
const btn = document.getElementById("downloadBtn");
const container = document.getElementById("container");
const message = document.getElementById("message");
let clicks = 0;
const maxClicks = 10;

function moveButton() {
  clicks++;
  if (clicks >= maxClicks) {
    // Stop moving, make it a download link
    btn.innerText = "Download Now!";
    btn.style.background = "linear-gradient(90deg, #f59e0b, #fbbf24)";
    btn.onclick = () => {
      window.location.href = "Files/BeginnerFitnessHabitTracker.pdf";
    };
    message.innerText = "You caught it! Click to download your PDF.";
    return;
  }

  // Get container dimensions
  const containerWidth = container.clientWidth - btn.offsetWidth;
  const containerHeight = container.clientHeight - btn.offsetHeight;

  // Generate random position within container
  const randomX = Math.floor(Math.random() * containerWidth);
  const randomY = Math.floor(Math.random() * containerHeight);

  btn.style.left = randomX + "px";
  btn.style.top = randomY + "px";
}

// Initialize button in center
btn.style.left = (container.clientWidth / 2 - btn.offsetWidth / 2) + "px";
btn.style.top = (container.clientHeight / 2 - btn.offsetHeight / 2) + "px";

btn.addEventListener("click", moveButton);

// Make responsive on window resize
window.addEventListener("resize", () => {
  if (clicks < maxClicks) moveButton();
});
</script>
</body>
</html>
