<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cart | The Soundwave Booth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito Sans', sans-serif; margin: 0; padding: 0; background: #F5EFE6; color: #1E1712; }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px; background: #1E1712; color: #fff;
    }
    .logo { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 400; cursor: pointer; text-decoration: none; color: #fff; }
    main { padding: 24px; max-width: 900px; margin: 0 auto; }
    h1 { font-family: 'Libre Baskerville', serif; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; }
    th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.9rem; }
    th { background: #faf5ee; font-weight: 600; }
    .qty-input { width: 60px; }
    .btn {
      padding: 8px 12px; border: none; border-radius: 4px;
      cursor: pointer; font-weight: 600; font-size: 0.85rem;
    }
    .btn-danger { background: #e53935; color: #fff; }
    .btn-danger:hover { background: #c62828; }
    .btn-primary { background: #A07050; color: #fff; }
    .btn-primary:hover { background: #C49070; }
    .totals { margin-top: 16px; text-align: right; font-size: 1rem; }
    .empty { background: #fff; padding: 24px; border-radius: 6px; font-size: 0.95rem; }
    .actions { margin-top: 16px; text-align: right; }
  </style>
</head>
<body>
  <header>
    <a href="index8.html" class="logo">The Soundwave <em>Booth</em></a>
    <div>Cart</div>
  </header>

  <main>
    <h1>Your Cart</h1>
    <div id="cart-container"></div>
    <div class="totals" id="cart-totals"></div>
    <div class="actions">
      <button class="btn btn-primary" id="checkout-btn">Proceed to Checkout</button>
    </div>
  </main>

  <script src="cart.js"></script>
  <script>
    function renderCart() {
      const cart = Cart.get();
      const container = document.getElementById('cart-container');
      const totalsDiv = document.getElementById('cart-totals');

      if (!cart.length) {
        container.innerHTML = '<div class="empty">Your cart is empty.</div>';
        totalsDiv.innerHTML = '';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Price</th>
              <th>Qty</th>
              <th>Subtotal</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
      `;

      let total = 0;
      cart.forEach((item, index) => {
        const subtotal = item.price * item.qty;
        total += subtotal;
        html += `
          <tr>
            <td>${item.name}</td>
            <td>$${(item.price / 100).toFixed(2)}</td>
            <td>
              <input type="number" min="1" class="qty-input" value="${item.qty}"
                onchange="updateQty(${index}, this.value)">
            </td>
            <td>$${(subtotal / 100).toFixed(2)}</td>
            <td><button class="btn btn-danger" onclick="removeItem(${index})">Remove</button></td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
      totalsDiv.innerHTML = `<strong>Total: $${(total / 100).toFixed(2)}</strong>`;
    }

    function updateQty(index, value) {
      const qty = parseInt(value, 10);
      if (isNaN(qty) || qty < 1) return;
      Cart.updateQty(index, qty);
      renderCart();
    }

    function removeItem(index) {
      Cart.remove(index);
      renderCart();
    }

    document.getElementById('checkout-btn').addEventListener('click', () => {
      const cart = Cart.get();
      if (!cart.length) return;
      const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      localStorage.setItem('cart_total_cents', String(total));
      window.location.href = 'checkout.html';
    });

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
