<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | The Soundwave Booth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito Sans', sans-serif; margin: 0; padding: 0; background: #F5EFE6; color: #1E1712; }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px; background: #1E1712; color: #fff;
    }
    .logo { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 400; cursor: pointer; text-decoration: none; color: #fff; }
    main { padding: 24px; max-width: 600px; margin: 0 auto; }
    h1 { font-family: 'Libre Baskerville', serif; margin-bottom: 12px; }
    .card-box {
      background: #fff; padding: 20px; border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    #card-container {
      margin-top: 16px;
      padding: 12px;
      border-radius: 4px;
      border: 1px solid #ddd;
      background: #fafafa;
    }
    #card-button {
      margin-top: 20px;
      padding: 10px 18px;
      background: #A07050;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
    }
    #card-button:disabled { opacity: 0.6; cursor: default; }
    .total { margin-top: 12px; font-weight: 600; }
  </style>
  <script type="text/javascript" src="https://sandbox.web.squarecdn.com/v1/square.js"></script>
</head>
<body>
  <header>
    <a href="index8.html" class="logo">The Soundwave <em>Booth</em></a>
    <div>Checkout</div>
  </header>

  <main>
    <h1>Secure Checkout</h1>
    <div class="card-box">
      <p>Enter your payment details below. Your card will be processed securely by Square.</p>
      <div class="total" id="order-total"></div>
      <div id="card-container"></div>
      <button id="card-button" type="button">Pay Now</button>
    </div>
  </main>

  <script>
    const SQUARE_APP_ID = 'REPLACE_WITH_YOUR_SQUARE_APP_ID';
    const SQUARE_LOCATION_ID = 'REPLACE_WITH_YOUR_LOCATION_ID';

    function loadTotal() {
      const cents = parseInt(localStorage.getItem('cart_total_cents') || '0', 10);
      document.getElementById('order-total').innerText =
        'Order Total: $' + (cents / 100).toFixed(2);
      return cents;
    }

    async function initializeCard(payments) {
      const card = await payments.card();
      await card.attach('#card-container');
      return card;
    }

    async function createPayment(token, amountCents) {
      const body = JSON.stringify({
        sourceId: token,
        amount: amountCents
      });

      const response = await fetch('/payments', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body
      });

      if (!response.ok) {
        const errorBody = await response.text();
        throw new Error(errorBody);
      }

      return response.json();
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const amountCents = loadTotal();
      if (!amountCents) {
        alert('Your cart is empty.');
        window.location.href = 'index8.html';
        return;
      }

      if (!window.Square) {
        console.error('Square Web Payments SDK failed to load.');
        return;
      }

      try {
        const payments = window.Square.payments(SQUARE_APP_ID, SQUARE_LOCATION_ID);
        const card = await initializeCard(payments);

        const cardButton = document.getElementById('card-button');
        cardButton.addEventListener('click', async (event) => {
          event.preventDefault();
          cardButton.disabled = true;

          try {
            const result = await card.tokenize();
            if (result.status === 'OK') {
              await createPayment(result.token, amountCents);
              alert('Payment successful.');
              localStorage.removeItem('cart');
              localStorage.removeItem('cart_total_cents');
              window.location.href = 'index8.html';
            } else {
              console.error(result);
              alert('Payment failed. Please check your card details.');
            }
          } catch (err) {
            console.error(err);
            alert('An error occurred while processing your payment.');
          } finally {
            cardButton.disabled = false;
          }
        });
      } catch (e) {
        console.error('Error initializing Square Payments:', e);
      }
    });
  </script>
</body>
</html>
