<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Academy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    line-height: 1.6;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  header {
    border-bottom: 1px solid #30363d;
    padding-bottom: 16px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  h1 { font-size: 24px; color: #58a6ff; }
  .progress { font-size: 14px; color: #8b949e; }
  .layout { display: grid; grid-template-columns: 280px 1fr; gap: 24px; }
  .sidebar {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    height: fit-content;
  }
  .sidebar h3 { font-size: 13px; text-transform: uppercase; color: #8b949e; margin-bottom: 12px; letter-spacing: 0.5px; }
  .lesson-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 4px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .lesson-item:hover { background: #21262d; }
  .lesson-item.active { background: #1f6feb; color: white; }
  .lesson-item.done .check { color: #3fb950; }
  .check { width: 16px; display: inline-block; }
  .lesson-content {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 24px;
  }
  .lesson-content h2 { margin-bottom: 12px; color: #58a6ff; }
  .lesson-content p { margin-bottom: 16px; }
  .lesson-content code {
    background: #0d1117;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'Monaco', 'Menlo', monospace;
    font-size: 13px;
    color: #ff7b72;
  }
  pre {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    margin: 12px 0;
    font-family: 'Monaco', 'Menlo', monospace;
    font-size: 13px;
  }
  .challenge {
    background: #1c2128;
    border-left: 3px solid #d29922;
    padding: 16px;
    margin: 20px 0;
    border-radius: 4px;
  }
  .challenge strong { color: #d29922; }
  textarea {
    width: 100%;
    min-height: 120px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
    color: #e6edf3;
    font-family: 'Monaco', 'Menlo', monospace;
    font-size: 13px;
    resize: vertical;
    margin-top: 12px;
  }
  .buttons { display: flex; gap: 8px; margin-top: 12px; }
  button {
    background: #238636;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
  }
  button:hover { background: #2ea043; }
  button.secondary { background: #21262d; border: 1px solid #30363d; }
  button.secondary:hover { background: #30363d; }
  .result {
    margin-top: 16px;
    padding: 12px;
    border-radius: 6px;
    background: #0d1117;
    border: 1px solid #30363d;
    overflow-x: auto;
  }
  .result.success { border-color: #3fb950; }
  .result.error { border-color: #f85149; color: #f85149; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #30363d; }
  th { background: #161b22; color: #58a6ff; }
  .feedback { margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 14px; }
  .feedback.correct { background: rgba(63, 185, 80, 0.15); color: #3fb950; }
  .feedback.incorrect { background: rgba(248, 81, 73, 0.15); color: #f85149; }
  .nav { display: flex; justify-content: space-between; margin-top: 24px; }
  .loading { text-align: center; padding: 40px; color: #8b949e; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📚 SQL Academy</h1>
    <div class="progress" id="progress">Loading database...</div>
  </header>
  <div id="app" class="loading">Initializing SQLite engine...</div>
</div>

<script>
const lessons = [
  {
    title: "SELECT Basics",
    content: `
      <h2>Lesson 1: SELECT Basics</h2>
      <p>SQL stands for <strong>Structured Query Language</strong>. The most fundamental command is <code>SELECT</code>, which retrieves data from a table.</p>
      <p>The basic syntax is:</p>
      <pre>SELECT column1, column2 FROM table_name;</pre>
      <p>To get every column, use the wildcard <code>*</code>:</p>
      <pre>SELECT * FROM employees;</pre>
      <p>We have a table called <code>employees</code> with columns: <code>id</code>, <code>name</code>, <code>department</code>, <code>salary</code>, <code>hire_date</code>.</p>
      <div class="challenge">
        <strong>🎯 Challenge:</strong> Write a query that returns the <code>name</code> and <code>department</code> of all employees.
      </div>
    `,
    starter: "SELECT  FROM employees;",
    check: (rows, cols) => cols.length === 2 && cols.includes("name") && cols.includes("department") && rows.length === 8
  },
  {
    title: "Filtering with WHERE",
    content: `
      <h2>Lesson 2: Filtering with WHERE</h2>
      <p>The <code>WHERE</code> clause lets you filter rows based on conditions.</p>
      <pre>SELECT * FROM employees WHERE department = 'Engineering';</pre>
      <p>You can use operators like <code>=</code>, <code>!=</code>, <code>&gt;</code>, <code>&lt;</code>, <code>&gt;=</code>, <code>&lt;=</code>, and combine conditions with <code>AND</code> / <code>OR</code>.</p>
      <div class="challenge">
        <strong>🎯 Challenge:</strong> Return all employees with a <code>salary</code> greater than 75000.
      </div>
    `,
    starter: "SELECT * FROM employees WHERE ",
    check: (rows) => rows.length > 0 && rows.every(r => r.salary > 75000)
  },
  {
    title: "Sorting with ORDER BY",
    content: `
      <h2>Lesson 3: Sorting with ORDER BY</h2>
      <p>Use <code>ORDER BY</code> to sort results. Add <code>DESC</code> for descending order.</p>
      <pre>SELECT * FROM employees ORDER BY salary DESC;</pre>
      <div class="challenge">
        <strong>🎯 Challenge:</strong> Return all employees sorted by <code>hire_date</code> from oldest to newest.
      </div>
    `,
    starter: "SELECT * FROM employees ORDER BY ",
    check: (rows) => {
      if (rows.length !== 8) return false;
      for (let i = 1; i < rows.length; i++) {
        if (rows[i].hire_date < rows[i-1].hire_date) return false;
      }
      return true;
    }
  },
  {
    title: "Aggregations",
    content: `
      <h2>Lesson 4: Aggregations</h2>
      <p>Aggregate functions compute a single value from a set of rows: <code>COUNT</code>, <code>SUM</code>, <code>AVG</code>, <code>MIN</code>, <code>MAX</code>.</p>
      <pre>SELECT AVG(salary) FROM employees;</pre>
      <p>Combine with <code>GROUP BY</code> to aggregate per group:</p>
      <pre>SELECT department, COUNT(*) FROM employees GROUP BY department;</pre>
      <div class="challenge">
        <strong>🎯 Challenge:</strong> For each <code>department</code>, return the department name and the average salary. Name the average column <code>avg_salary</code>.
      </div>
    `,
    starter: "SELECT department, AVG(salary) AS avg_salary FROM employees GROUP BY ",
    check: (rows, cols) => cols.includes("department") && cols.includes("avg_salary") && rows.length >= 3
  }
];

let db, currentLesson = 0, completed = new Set();

async function init() {
  const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
  db = new SQL.Database();
  db.run(`
    CREATE TABLE employees (
      id INTEGER PRIMARY KEY,
      name TEXT,
      department TEXT,
      salary INTEGER,
      hire_date TEXT
    );
    INSERT INTO employees VALUES
      (1, 'Alice Chen', 'Engineering', 95000, '2019-03-15'),
      (2, 'Bob Martinez', 'Sales', 62000, '2020-07-22'),
      (3, 'Carol Singh', 'Engineering', 110000, '2018-01-10'),
      (4, 'David Kim', 'Marketing', 71000, '2021-05-03'),
      (5, 'Eve Johnson', 'Sales', 58000, '2022-09-14'),
      (6, 'Frank Wright', 'Engineering', 88000, '2020-11-30'),
      (7, 'Grace Lee', 'Marketing', 79000, '2019-06-18'),
      (8, 'Henry Patel', 'Sales', 67000, '2021-02-25');
  `);
  render();
}

function render() {
  const app = document.getElementById('app');
  app.className = '';
  document.getElementById('progress').textContent = `${completed.size} / ${lessons.length} complete`;
  const lesson = lessons[currentLesson];
  app.innerHTML = `
    <div class="layout">
      <div class="sidebar">
        <h3>Lessons</h3>
        ${lessons.map((l, i) => `
          <div class="lesson-item ${i === currentLesson ? 'active' : ''} ${completed.has(i) ? 'done' : ''}" onclick="jumpTo(${i})">
            <span class="check">${completed.has(i) ? '✓' : ''}</span> ${l.title}
          </div>
        `).join('')}
      </div>
      <div class="lesson-content">
        ${lesson.content}
        <textarea id="editor">${lesson.starter}</textarea>
        <div class="buttons">
          <button onclick="runQuery()">▶ Run Query</button>
          <button class="secondary" onclick="resetEditor()">Reset</button>
        </div>
        <div id="output"></div>
        <div class="nav">
          <button class="secondary" onclick="prev()" ${currentLesson === 0 ? 'disabled' : ''}>← Previous</button>
          <button class="secondary" onclick="next()" ${currentLesson === lessons.length - 1 ? 'disabled' : ''}>Next →</button>
        </div>
      </div>
    </div>
  `;
}

function runQuery() {
  const sql = document.getElementById('editor').value;
  const output = document.getElementById('output');
  try {
    const results = db.exec(sql);
    if (results.length === 0) { output.innerHTML = '<div class="result success">Query ran (no rows returned)</div>'; return; }
    const { columns, values } = results[0];
    const rows = values.map(row => Object.fromEntries(columns.map((c, i) => [c, row[i]])));
    let html = '<div class="result success"><table><thead><tr>' +
      columns.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>' +
      values.map(r => '<tr>' + r.map(v => `<td>${v}</td>`).join('') + '</tr>').join('') +
      '</tbody></table></div>';
    const ok = lessons[currentLesson].check(rows, columns);
    if (ok) {
      completed.add(currentLesson);
      html += '<div class="feedback correct">✓ Correct! Well done.</div>';
      document.getElementById('progress').textContent = `${completed.size} / ${lessons.length} complete`;
    } else {
      html += '<div class="feedback incorrect">Query ran, but the result doesn\'t match the challenge. Try again.</div>';
    }
    output.innerHTML = html;
  } catch (e) {
    output.innerHTML = `<div class="result error">Error: ${e.message}</div>`;
  }
}

function resetEditor() { document.getElementById('editor').value = lessons[currentLesson].starter; document.getElementById('output').innerHTML = ''; }
function jumpTo(i) { currentLesson = i; render(); }
function next() { if (currentLesson < lessons.length - 1) { currentLesson++; render(); } }
function prev() { if (currentLesson > 0) { currentLesson--; render(); } }

init();
</script>
</body>
</html>
