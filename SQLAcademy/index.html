// ============== DATABASE SETUP ==============

CREATE TABLE guilds (

  founded_year INTEGER,

);

CREATE TABLE heroes (
  id INTEGER PRIMARY KEY,
  name TEXT NOT NULL,
  class TEXT NOT NULL,
  level INTEGER NOT NULL,
  xp INTEGER NOT NULL,
  guild_id INTEGER,
  FOREIGN KEY (guild_id) REFERENCES guilds(id)
);

CREATE TABLE quests (
  id INTEGER PRIMARY KEY,
  name TEXT NOT NULL,
  difficulty TEXT NOT NULL,
  reward_gold INTEGER NOT NULL,
  min_level INTEGER NOT NULL
);

CREATE TABLE hero_quests (
  hero_id INTEGER,
  quest_id INTEGER,
  completed_date TEXT,
  PRIMARY KEY (hero_id, quest_id),
  FOREIGN KEY (hero_id) REFERENCES heroes(id),
  FOREIGN KEY (quest_id) REFERENCES quests(id)
);

CREATE TABLE items (

  type TEXT NOT NULL,

);

  FOREIGN KEY (hero_id) REFERENCES heroes(id),

// ============== LESSONS ==============
const lessons = [
  {
    title: "1. SELECT basics",
    content: `
      <h2>SELECT basics</h2>
      <p>SQL is how we talk to databases. The most common command is <code>SELECT</code>, which retrieves rows from a table.</p>
      <p>Basic shape:</p>
      <pre>SELECT column1, column2 FROM table_name;</pre>
      <p>Use <code>*</code> to grab every column:</p>
      <pre>SELECT * FROM heroes;</pre>
      <p>We have a <code>heroes</code> table with these columns: <code>id</code>, <code>name</code>, <code>class</code>, <code>level</code>, <code>xp</code>, <code>guild_id</code>.</p>
      <div class="challenge"><strong>🎯 Challenge:</strong> Return the <code>name</code> and <code>class</code> of every hero.</div>
    `,
    starter: "SELECT  FROM heroes;",
    check: (rows, cols) => cols.length === 2 && cols.includes("name") && cols.includes("class") && rows.length === 15
  },
  {
    title: "2. Filtering with WHERE",
    content: `
      <h2>Filtering with WHERE</h2>
      <p>The <code>WHERE</code> clause filters rows. Only rows where the condition is true are returned.</p>
      <pre>SELECT * FROM heroes WHERE class = 'Mage';</pre>
      <p>Operators: <code>=</code>, <code>!=</code> (or <code>&lt;&gt;</code>), <code>&gt;</code>, <code>&lt;</code>, <code>&gt;=</code>, <code>&lt;=</code>.</p>
      <p>Strings go in single quotes. Numbers don't.</p>
      <div class="challenge"><strong>🎯 Challenge:</strong> Return all heroes with a <code>level</code> greater than 25.</div>
    `,
    starter: "SELECT * FROM heroes WHERE ",
    check: (rows) => rows.length > 0 && rows.every(r => r.level > 25) && rows.length === 9
  },
  {
    title: "3. AND, OR, NOT",
    content: `
      <h2>Combining conditions</h2>
      <p>Combine conditions with <code>AND</code>, <code>OR</code>, and <code>NOT</code>. Use parentheses to control precedence.</p>
      <pre>SELECT * FROM heroes
WHERE class = 'Warrior' AND level &gt;= 30;</pre>
      <pre>SELECT * FROM heroes
WHERE class = 'Mage' OR class = 'Paladin';</pre>
      <div class="challenge"><strong>🎯 Challenge:</strong> Return all <code>Rogue</code> heroes whose <code>level</code> is at least 20.</div>
    `,
    starter: "SELECT * FROM heroes\nWHERE ",
    check: (rows) => rows.length === 3 && rows.every(r => r.class === 'Rogue' && r.level >= 20)
  },
  {
    title: "4. ORDER BY & LIMIT",
    content: `
      <h2>Sorting and limiting</h2>
      <p><code>ORDER BY</code> sorts results. Default is ascending; add <code>DESC</code> for descending.</p>
      <pre>SELECT * FROM heroes ORDER BY level DESC;</pre>
      <p><code>LIMIT</code> caps the number of rows. Combine them to get top-N queries:</p>
      <pre>SELECT * FROM heroes ORDER BY xp DESC LIMIT 3;</pre>
      <div class="challenge"><strong>🎯 Challenge:</strong> Return the top 5 heroes by <code>xp</code>, highest first. Include <code>name</code> and <code>xp</code>.</div>
    `,
    starter: "SELECT name, xp FROM heroes\nORDER BY ",
    check: (rows, cols) => rows.length === 5 && cols.includes("name") && cols.includes("xp") && rows[0].xp === 35800
  },
  {
    title: "5. DISTINCT",
    content: `
      <h2>Unique values with DISTINCT</h2>
      <p><code>DISTINCT</code> removes duplicate rows from the result.</p>
      <pre>SELECT DISTINCT class FROM heroes;</pre>
      <p>Useful for quickly seeing what unique values exist in a column.</p>
      <div class="challenge"><strong>🎯 Challenge:</strong> Return every unique <code>difficulty</code> from the <code>quests</code> table.</div>
    `,
    starter: "SELECT DISTINCT  FROM quests;",
    check: (rows, cols) => cols.length === 1 && cols[0] === "difficulty" && rows.length === 4
  },
  {
    title: "6. LIKE & pattern matching",
    content: `
      <h2>Pattern matching with LIKE</h2>
      <p><code>LIKE</code> matches text patterns. Use <code>%</code> for any number of characters and <code>_</code> for a single character.</p>
      <pre>SELECT * FROM heroes WHERE name LIKE 'A%';      -- starts with A
SELECT * FROM heroes WHERE name LIKE '%shadow%'; -- contains "shadow"
SELECT * FROM heroes WHERE name LIKE '_orin%';   -- second letter o, starts "_orin"</pre>
      <div class="challenge"><strong>🎯 Challenge:</strong> Return all heroes whose <code>name</code> ends with the letter <code>r</code>.</div>
    `,
    starter: "SELECT * FROM heroes\nWHERE name LIKE ",
    check: (rows) => rows.length > 0 && rows.every(r => r.name.endsWith('r'))
  },
  {
    title: "7. Aggregate functions",
    content: `
      <h2>Aggregate functions</h2>
      <p>Aggregates compute a single value across many rows:</p>
      <ul>
        <li><code>COUNT(*)</code> — number of rows</li>
        <li><code>SUM(col)</code> — total</li>
        <li><code>AVG(col)</code> — average</li>
        <li><code>MIN(col)</code> / <code>MAX(col)</code> — smallest / largest</li>
      </ul>
      <pre>SELECT COUNT(*), AVG(level), MAX(xp) FROM heroes;</pre>
      <p>Use <code>AS</code> to name the result column:</p>
      <pre>SELECT AVG(level) AS avg_level FROM heroes;</pre>
      <div class="challenge"><strong>🎯 Challenge:</strong> Return the total <code>reward_gold</code> across all quests as a column named <code>total_gold</code>.</div>
    `,
    starter: "SELECT  AS total_gold FROM quests;",
    check: (rows, cols) => cols.includes("total_gold") && rows[0].total_gold === 15100
  },
  {
    title: "8. GROUP BY",
    content: `
      <h2>Grouping rows</h2>
      <p><code>GROUP BY</code> collapses rows that share a value, then runs aggregates per group.</p>
      <pre>SELECT class, COUNT(*) AS hero_count
FROM heroes
GROUP BY class;</pre>
      <p>Rule: every column in <code>SELECT</code> that isn't aggregated must appear in <code>GROUP BY</code>.</p>
      <div class="challenge"><strong>🎯 Challenge:</strong> For each <code>class</code>, return the class name and the average level as <code>avg_level</code>.</div>
    `,
    starter: "SELECT class, AVG(level) AS avg_level\nFROM heroes\nGROUP BY ",
    check: (rows, cols) => cols.includes("class") && cols.includes("avg_level") && rows.length === 5
  },
  {
    title: "9. HAVING",
    content: `
      <h2>Filtering groups with HAVING</h2>
      <p><code>WHERE</code> filters rows <em>before</em> grouping. <code>HAVING</code> filters groups <em>after</em>.</p>
      <pre>SELECT class, COUNT(*) AS n
FROM heroes
GROUP BY class
HAVING COUNT(*) &gt;= 3;</pre>
      <p>If you want to filter on an aggregate (like <code>COUNT</code> or <code>AVG</code>), it has to live in <code>HAVING</code>.</p>
      <div class="challenge"><strong>🎯 Challenge:</strong> Return each <code>class</code> and its average level (as <code>avg_level</code>), but only for classes whose average level is greater than 25.</div>
    `,
    starter: "SELECT class, AVG(level) AS avg_level\nFROM heroes\nGROUP BY class\nHAVING ",
    check: (rows, cols) => cols.includes("class") && cols.includes("avg_level") && rows.every(r => r.avg_level > 25) && rows.length > 0
  },
  {
    title: "10. INNER JOIN",
    content: `
      <h2>Combining tables with INNER JOIN</h2>
      <p>A <code>JOIN</code> stitches rows from two tables together based on a matching condition. <code>INNER JOIN</code> returns only rows that match on both sides.</p>
      <pre>SELECT heroes.name, guilds.name AS guild_name
FROM heroes
INNER JOIN guilds ON heroes.guild_id = guilds.id;</pre>
      <p>Heroes without a guild (<code>guild_id IS NULL</code>) are excluded — that's what "inner" means.</p>
      <div class="challenge"><strong>🎯 Challenge:</strong> Return each hero's <code>name</code> alongside their guild's <code>name</code> (alias the guild column as <code>guild_name</code>). Heroes without a guild should be excluded.</div>
    `,
    starter: "SELECT heroes.name, guilds.name AS guild_name\nFROM heroes\nINNER JOIN guilds ON ",
    check: (rows, cols) => cols.includes("name") && cols.includes("guild_name") && rows.length === 13 && rows.every(r => r.guild_name)
  },
  {
    title: "11. LEFT JOIN",
    content: `
      <h2>Keeping unmatched rows with LEFT JOIN</h2>
      <p><code>LEFT JOIN</code> keeps every row from the left table, even if no match exists on the right. Missing matches show up as <code>NULL</code>.</p>
      <pre>SELECT heroes.name, guilds.name AS guild_name
FROM heroes
LEFT JOIN guilds ON heroes.guild_id = guilds.id;</pre>
      <p>Use this when you want "all X, plus their Y if any."</p>
      <div class="challenge"><strong>🎯 Challenge:</strong> Return every hero's <code>name</code> and their guild's <code>name</code> as <code>guild_name</code>. Heroes without a guild should still appear (with NULL).</div>
    `,
    starter: "SELECT heroes.name, guilds.name AS guild_name\nFROM heroes\nLEFT JOIN ",
    check: (rows, cols) => cols.includes("name") && cols.includes("guild_name") && rows.length === 15 && rows.some(r => r.guild_name === null)
  },
  {
    title: "12. Multi-table joins",
    content: `
      <h2>Joining multiple tables</h2>
      <p>You can chain joins to walk relationships. Here we link heroes → hero_quests → quests:</p>
      <pre>SELECT h.name, q.name AS quest_name
FROM heroes h
INNER JOIN hero_quests hq ON h.id = hq.hero_id
INNER JOIN quests q ON hq.quest_id = q.id;</pre>
      <p>Notice the <strong>table aliases</strong> (<code>h</code>, <code>hq</code>, <code>q</code>) — they keep the query readable.</p>
      <div class="challenge"><strong>🎯 Challenge:</strong> Return each hero's <code>name</code> and the total <code>reward_gold</code> they've earned from completed quests, as <code>total_gold</code>. Sort highest first.</div>
    `,
    starter: "SELECT h.name, SUM(q.reward_gold) AS total_gold\nFROM heroes h\nINNER JOIN hero_quests hq ON h.id = hq.hero_id\nINNER JOIN quests q ON hq.quest_id = q.id\nGROUP BY h.id\nORDER BY ",
    check: (rows, cols) => cols.includes("name") && cols.includes("total_gold") && rows[0].total_gold >= rows[rows.length-1].total_gold && rows.length > 5
  },
  {
    title: "13. Subqueries",
    content: `
      <h2>Subqueries</h2>
      <p>A subquery is a query inside another query. The most common use: comparing to an aggregate.</p>
      <pre>SELECT name, level
FROM heroes
WHERE level &gt; (SELECT AVG(level) FROM heroes);</pre>
      <p>The inner query runs first, produces a value, then the outer query uses it.</p>
      <div class="challenge"><strong>🎯 Challenge:</strong> Return the <code>name</code> and <code>xp</code> of all heroes whose <code>xp</code> is greater than the average <code>xp</code> across all heroes.</div>
    `,
    starter: "SELECT name, xp\nFROM heroes\nWHERE xp > (SELECT  FROM heroes);",
    check: (rows, cols) => cols.includes("name") && cols.includes("xp") && rows.length === 7 && rows.every(r => r.xp > 15553)
  },
  {
    title: "14. IN, NOT IN, EXISTS",
    content: `
      <h2>Set membership</h2>
      <p><code>IN</code> checks whether a value is in a list (or a subquery's results).</p>
      <pre>SELECT * FROM heroes WHERE class IN ('Mage', 'Paladin');

SELECT name FROM heroes
WHERE id IN (SELECT hero_id FROM hero_quests WHERE quest_id = 5);</pre>
      <p><code>NOT IN</code> is the inverse. <code>EXISTS</code> is similar but checks whether a subquery returns any rows at all.</p>
      <div class="challenge"><strong>🎯 Challenge:</strong> Return the <code>name</code> of every hero who has <strong>never</strong> completed any quest. (Hint: their id won't appear in <code>hero_quests</code>.)</div>
    `,
    starter: "SELECT name\nFROM heroes\nWHERE id NOT IN (SELECT  FROM hero_quests);",
    check: (rows, cols) => cols.length === 1 && cols[0] === "name" && rows.length === 1 && rows[0].name === "Orin Steelheart"
  },
  {
    title: "15. CTEs (WITH)",
    content: `
      <h2>Common Table Expressions</h2>
      <p>A CTE lets you name a subquery and use it like a temporary table. It makes complex queries readable.</p>
      <pre>WITH class_stats AS (
  SELECT class, AVG(level) AS avg_lvl
  FROM heroes
  GROUP BY class
)
SELECT * FROM class_stats WHERE avg_lvl &gt; 25;</pre>
      <p>You can define multiple CTEs separated by commas, and they can reference each other.</p>
      <div class="challenge"><strong>🎯 Challenge:</strong> Using a CTE called <code>quest_counts</code>, compute how many quests each hero has completed. Then return the <code>name</code> and the count (as <code>quests_done</code>) of heroes who've completed more than 3 quests.</div>
    `,
    starter: "WITH quest_counts AS (\n  SELECT hero_id, COUNT(*) AS quests_done\n  FROM hero_quests\n  GROUP BY hero_id\n)\nSELECT h.name, qc.quests_done\nFROM heroes h\nINNER JOIN quest_counts qc ON h.id = qc.hero_id\nWHERE ",
    check: (rows, cols) => cols.includes("name") && cols.includes("quests_done") && rows.every(r => r.quests_done > 3) && rows.length >= 2
  },
  {
    title: "16. Window functions",
    content: `
      <h2>Window functions</h2>
      <p>Window functions compute values across a "window" of rows <em>without</em> collapsing the rows like <code>GROUP BY</code> does.</p>
      <pre>SELECT name, class, xp,
       RANK() OVER (PARTITION BY class ORDER BY xp DESC) AS class_rank
FROM heroes;</pre>
      <p>Common windows: <code>ROW_NUMBER()</code>, <code>RANK()</code>, <code>DENSE_RANK()</code>, <code>LAG()</code>, <code>LEAD()</code>, plus the aggregates (<code>SUM</code>, <code>AVG</code>) as windows.</p>
      <p><code>PARTITION BY</code> divides rows into groups; <code>ORDER BY</code> orders within each group.</p>
      <div class="challenge"><strong>🎯 Challenge:</strong> For every hero, return their <code>name</code>, <code>class</code>, <code>xp</code>, and their rank within their class by <code>xp</code> descending. Name the rank column <code>class_rank</code>. The top hero in each class should be rank 1.</div>
    `,
    starter: "SELECT name, class, xp,\n  RANK() OVER (PARTITION BY  ORDER BY  ) AS class_rank\nFROM heroes;",
    check: (rows, cols) => {
      if (!cols.includes("class_rank") || rows.length !== 15) return false;
      const byClass = {};
      rows.forEach(r => { byClass[r.class] = byClass[r.class] || []; byClass[r.class].push(r); });
      return Object.values(byClass).every(cls => {
        const sorted = [...cls].sort((a,b) => b.xp - a.xp);
        return sorted[0].class_rank === 1;
      });
    }
  }
];

// ============== STATE ==============
let db, currentLesson = 0, mode = 'learn';
let completed = new Set();
let savedEditors = {};
let sandboxQuery = "-- Free-form SQL sandbox\n-- Try anything! Tables: heroes, guilds, quests, hero_quests, items, hero_items\n\nSELECT * FROM heroes LIMIT 5;";

const STORAGE_KEY = 'sql-academy-progress-v2';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      completed = new Set(data.completed || []);
      currentLesson = data.currentLesson || 0;
      savedEditors = data.savedEditors || {};
      sandboxQuery = data.sandboxQuery || sandboxQuery;
    }
  } catch(e) { console.warn('Could not load progress', e); }
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completed: [...completed],
      currentLesson,
      savedEditors,
      sandboxQuery
    }));
  } catch(e) {}
}

// ============== INIT ==============
async function init() {
  const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
  db = new SQL.Database();
  db.exec(SCHEMA_SQL);
  loadProgress();
  render();
}

// ============== RENDER ==============
function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab-switch button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + m).classList.add('active');
  render();
}

function render() {
  const app = document.getElementById('app');
  app.className = '';
  const pct = Math.round(100 * completed.size / lessons.length);
  document.getElementById('progress').innerHTML = `${completed.size} / ${lessons.length} complete<div class="meter"><div class="meter-fill" style="width:${pct}%"></div></div>`;
  if (mode === 'sandbox') return renderSandbox(app);
  if (mode === 'schema') return renderSchema(app);
  renderLearn(app);
}

function renderLearn(app) {
  const lesson = lessons[currentLesson];
  const savedCode = savedEditors[currentLesson] !== undefined ? savedEditors[currentLesson] : lesson.starter;
  app.innerHTML = `
    <div class="layout">
      <div class="sidebar">
        <h3>Curriculum</h3>
        ${lessons.map((l, i) => `
          <div class="lesson-item ${i === currentLesson ? 'active' : ''} ${completed.has(i) ? 'done' : ''}" onclick="jumpTo(${i})">
            <span class="check">${completed.has(i) ? '✓' : ''}</span>
            <span>${l.title}</span>
          </div>
        `).join('')}
      </div>
      <div class="panel">
        ${lesson.content}
        <textarea id="editor" spellcheck="false" oninput="onEditorInput()">${escapeHtml(savedCode)}</textarea>
        <div class="buttons">
          <button class="btn" onclick="runQuery()">▶ Run Query</button>
          <button class="btn secondary" onclick="resetEditor()">Reset</button>
        </div>
        <div id="output"></div>
        <div class="nav">
          <button class="btn secondary" onclick="prev()" ${currentLesson === 0 ? 'disabled' : ''}>← Previous</button>
          <button class="btn secondary" onclick="next()" ${currentLesson === lessons.length - 1 ? 'disabled' : ''}>Next →</button>
        </div>
      </div>
    </div>
  `;
}

function renderSandbox(app) {
  app.innerHTML = `
    <div class="panel">
      <h2>🧪 Sandbox</h2>
      <p>Run any SQL against the database. Nothing's checked — explore freely. Your query is saved automatically.</p>
      <p style="font-size: 13px; color: #8b949e;">Tables available: <code>heroes</code>, <code>guilds</code>, <code>quests</code>, <code>hero_quests</code>, <code>items</code>, <code>hero_items</code>. Switch to the <strong>Schema</strong> tab to see the columns.</p>
      <textarea id="editor" spellcheck="false" oninput="onSandboxInput()" style="min-height: 220px;">${escapeHtml(sandboxQuery)}</textarea>
      <div class="buttons">
        <button class="btn" onclick="runSandbox()">▶ Run Query</button>
        <button class="btn secondary" onclick="resetDatabase()">↻ Reset Database</button>
      </div>
      <div id="output"></div>
    </div>
  `;
}

function renderSchema(app) {
  const tables = ['heroes', 'guilds', 'quests', 'hero_quests', 'items', 'hero_items'];
  const blocks = tables.map(t => {
    const info = db.exec(`PRAGMA table_info(${t});`)[0];
    const count = db.exec(`SELECT COUNT(*) FROM ${t};`)[0].values[0][0];
    const cols = info.values.map(r => `<div class="col">• <strong style="color:#e6edf3">${r[1]}</strong> <span style="opacity:.7">${r[2]}</span>${r[5] ? ' <span style="color:#d29922">PK</span>' : ''}</div>`).join('');
    return `<div class="schema-block">
      <div style="margin-bottom: 6px;"><strong>${t}</strong> <span class="row-count">— ${count} rows</span></div>
      ${cols}
    </div>`;
  }).join('');
  app.innerHTML = `
    <div class="panel">
      <h2>📋 Database Schema</h2>
      <p>This is the fantasy-world database you're querying. Click <strong>Sandbox</strong> to explore it freely.</p>
      ${blocks}
      <h3 style="margin-top: 20px;">Relationships</h3>
      <p style="font-size: 13px; color: #8b949e;">
        <code>heroes.guild_id</code> → <code>guilds.id</code><br>
        <code>hero_quests.hero_id</code> → <code>heroes.id</code><br>
        <code>hero_quests.quest_id</code> → <code>quests.id</code><br>
        <code>hero_items.hero_id</code> → <code>heroes.id</code><br>
        <code>hero_items.item_id</code> → <code>items.id</code>
      </p>
    </div>
  `;
}

// ============== ACTIONS ==============
function onEditorInput() {
  savedEditors[currentLesson] = document.getElementById('editor').value;
  saveProgress();
}
function onSandboxInput() {
  sandboxQuery = document.getElementById('editor').value;
  saveProgress();
}

function runQuery() {
  const sql = document.getElementById('editor').value;
  const output = document.getElementById('output');
  try {
    const results = db.exec(sql);
    if (results.length === 0) {
      output.innerHTML = '<div class="result">Query ran successfully (no rows returned).</div>';
      return;
    }
    const { columns, values } = results[0];
    const rows = values.map(row => Object.fromEntries(columns.map((c, i) => [c, row[i]])));
    let html = renderTable(columns, values);
    let ok = false;
    try { ok = lessons[currentLesson].check(rows, columns); } catch(e) { ok = false; }
    if (ok) {
      if (!completed.has(currentLesson)) {
        completed.add(currentLesson);
        saveProgress();
      }
      html += '<div class="feedback correct">✓ Correct! Nicely done. Click <strong>Next →</strong> to continue.</div>';
      const pct = Math.round(100 * completed.size / lessons.length);
      document.getElementById('progress').innerHTML = `${completed.size} / ${lessons.length} complete<div class="meter"><div class="meter-fill" style="width:${pct}%"></div></div>`;
      document.querySelectorAll('.lesson-item')[currentLesson].classList.add('done');
      document.querySelectorAll('.lesson-item')[currentLesson].querySelector('.check').textContent = '✓';
    } else {
      html += '<div class="feedback incorrect">Query ran, but the result doesn\'t match the challenge. Take another look.</div>';
    }
    output.innerHTML = html;
  } catch (e) {
    output.innerHTML = `<div class="result error"><strong>Error:</strong> ${escapeHtml(e.message)}</div>`;
  }
}

function runSandbox() {
  const sql = document.getElementById('editor').value;
  const output = document.getElementById('output');
  try {
    const results = db.exec(sql);
    if (results.length === 0) {
      output.innerHTML = '<div class="result">Query ran successfully (no rows returned).</div>';
      return;
    }
    // Show all result sets
    output.innerHTML = results.map(r => renderTable(r.columns, r.values)).join('');
  } catch (e) {
    output.innerHTML = `<div class="result error"><strong>Error:</strong> ${escapeHtml(e.message)}</div>`;
  }
}

function renderTable(columns, values) {
  return `<div class="result"><div class="row-count">${values.length} row${values.length===1?'':'s'}</div>
    <table><thead><tr>${columns.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr></thead>
    <tbody>${values.map(r => '<tr>' + r.map(v => `<td>${v === null ? '<em style="color:#6e7681">NULL</em>' : escapeHtml(String(v))}</td>`).join('') + '</tr>').join('')}</tbody>
    </table></div>`;
}

async function resetDatabase() {
  const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
  db = new SQL.Database();
  db.exec(SCHEMA_SQL);
  document.getElementById('output').innerHTML = '<div class="result">Database reset to original state.</div>';
}

function resetEditor() {
  delete savedEditors[currentLesson];
  saveProgress();
  document.getElementById('editor').value = lessons[currentLesson].starter;
  document.getElementById('output').innerHTML = '';
}

function jumpTo(i) { currentLesson = i; saveProgress(); render(); }
function next() { if (currentLesson < lessons.length - 1) { currentLesson++; saveProgress(); render(); } }
function prev() { if (currentLesson > 0) { currentLesson--; saveProgress(); render(); } }

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

init();
</script>
</body>
</html>
