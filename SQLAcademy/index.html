<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>queryschool — A course in writing SQL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<style>
  :root {
    --bg: #08080B; --bg-1: #0E0E12; --bg-2: #131318;
    --surface: #1A1A20; --surface-2: #22222A; --surface-3: #2D2D38;
    --border: #25252E; --border-2: #35353F; --border-bright: #4B4B58;
    --text: #F5F5F7; --text-2: #A8A8B5; --text-3: #6E6E7D; --text-4: #4A4A55;
    --accent: #818CF8; --accent-2: #A78BFA; --accent-dim: #312E81;
    --accent-bg: rgba(129, 140, 248, 0.08);
    --warning: #FBBF24; --error: #F87171; --info: #60A5FA;
    --r: 6px; --r-sm: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 15px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
  }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(8, 8, 11, 0.7);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    max-width: 1280px; margin: 0 auto;
    padding: 14px 28px;
    display: flex; justify-content: space-between; align-items: center; gap: 20px;
  }
  .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
  .brand-glyph {
    width: 26px; height: 26px;
    background: var(--accent); border-radius: var(--r-sm);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    color: var(--bg); font-size: 14px; line-height: 1;
  }
  .brand-name {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600; font-size: 15px;
    color: var(--text); letter-spacing: -0.005em;
  }
  .brand-name span { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .nav-tabs {
    display: flex; gap: 2px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 3px;
  }
  .nav-tab {
    background: transparent; color: var(--text-2); border: none;
    padding: 6px 14px; font-size: 13px; font-weight: 500;
    cursor: pointer; border-radius: var(--r-sm); transition: all 0.15s;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { background: var(--surface-3); color: var(--text); }

  .dataset-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px; font-weight: 500; color: var(--text-2);
    cursor: pointer; transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .dataset-pill:hover { color: var(--text); border-color: var(--border-2); }
  .dataset-pill .icon { font-size: 14px; }
  .dataset-pill .swap {
    color: var(--text-3); font-family: 'JetBrains Mono', monospace; font-size: 10px;
    border-left: 1px solid var(--border); padding-left: 8px; margin-left: 2px;
  }

  .progress-pill {
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--text-2);
    padding: 6px 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 999px;
  }
  .progress-pill-bar { width: 56px; height: 4px; background: var(--surface-3); border-radius: 999px; overflow: hidden; }
  .progress-pill-fill { height: 100%; background: var(--accent); box-shadow: 0 0 8px rgba(129, 140, 248, 0.4); transition: width 0.4s ease; }

  /* LAYOUT */
  .container { max-width: 1280px; margin: 0 auto; padding: 32px 28px 96px; }
  .grid { display: grid; grid-template-columns: 244px 1fr; gap: 52px; }
  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; gap: 28px; }
    .nav-inner { padding: 12px 16px; flex-wrap: wrap; }
    .container { padding: 24px 16px 60px; }
  }

  /* DATASET PICKER */
  .picker-screen {
    min-height: 80vh;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 40px 0;
  }
  .picker-head { max-width: 760px; margin: 0 auto 40px; text-align: center; }
  .picker-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--accent); font-weight: 500;
    margin-bottom: 16px;
    letter-spacing: 0.04em;
  }
  .picker-head h1 {
    font-size: clamp(40px, 6vw, 64px);
    font-weight: 700; line-height: 1.05;
    letter-spacing: -0.03em; color: var(--text);
    margin-bottom: 18px;
  }
  .picker-head .lede {
    font-size: 18px; color: var(--text-2); line-height: 1.55;
    max-width: 580px; margin: 0 auto;
  }
  .picker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    max-width: 1080px;
    margin: 0 auto;
  }
  .picker-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 28px 24px 22px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex; flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .picker-card:hover {
    background: var(--surface);
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(129, 140, 248, 0.06);
  }
  .picker-card::before {
    content: '';
    position: absolute;
    inset: 0 0 auto 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .picker-card:hover::before { opacity: 0.6; }
  .picker-icon {
    width: 44px; height: 44px;
    background: var(--accent-bg);
    border: 1px solid rgba(129, 140, 248, 0.2);
    border-radius: var(--r);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin-bottom: 18px;
  }
  .picker-card h3 {
    font-size: 20px; font-weight: 600;
    color: var(--text); letter-spacing: -0.015em;
    margin-bottom: 6px;
  }
  .picker-card .tagline { font-size: 14px; color: var(--text-2); line-height: 1.5; margin-bottom: 18px; }
  .picker-tables {
    display: flex; flex-wrap: wrap; gap: 4px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }
  .picker-table-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    padding: 2px 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-3);
  }
  .picker-cta {
    margin-top: 18px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }
  .picker-card.current {
    background: var(--surface);
    border-color: var(--accent);
  }
  .picker-card.current::after {
    content: 'current';
    position: absolute; top: 14px; right: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--accent);
    padding: 2px 8px;
    background: var(--accent-bg);
    border: 1px solid rgba(129, 140, 248, 0.25);
    border-radius: 999px;
    font-weight: 600;
  }
  .picker-foot {
    margin: 36px auto 0;
    max-width: 580px; text-align: center;
    font-size: 13px; color: var(--text-3);
    line-height: 1.5;
  }

  /* HOME */
  .home-hero { padding: 64px 0 48px; max-width: 880px; position: relative; }
  .home-hero::before {
    content: '';
    position: absolute;
    top: 40px; left: -240px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(129, 140, 248, 0.08) 0%, transparent 60%);
    pointer-events: none; z-index: -1;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px; font-weight: 500; color: var(--text-2);
    margin-bottom: 28px;
  }
  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.18), 0 0 12px rgba(129, 140, 248, 0.5);
  }
  .home-hero h1 {
    font-size: clamp(44px, 7vw, 84px);
    font-weight: 700; line-height: 1.02;
    letter-spacing: -0.035em; color: var(--text);
    margin-bottom: 24px;
  }
  .home-hero h1 .accent { color: var(--accent); font-style: italic; font-weight: 600; }
  .home-hero .lede {
    font-size: 19px; color: var(--text-2); line-height: 1.55;
    margin-bottom: 36px; max-width: 620px;
  }
  .cta-row { display: flex; gap: 12px; flex-wrap: wrap; }

  .home-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1px;
    margin-top: 56px;
    background: var(--border); border: 1px solid var(--border);
    border-radius: var(--r); overflow: hidden;
  }
  .stat { background: var(--bg-1); padding: 22px 24px; }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px; font-weight: 700;
    color: var(--text); line-height: 1;
    margin-bottom: 6px; letter-spacing: -0.02em;
  }
  .stat-num .accent { color: var(--accent); }
  .stat-label {
    font-size: 12px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500;
  }

  .home-section { margin-top: 80px; padding-top: 56px; border-top: 1px solid var(--border); }
  .section-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--accent); font-weight: 500;
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 36px; font-weight: 700;
    letter-spacing: -0.025em; color: var(--text);
    margin-bottom: 14px;
  }
  .section-lede {
    font-size: 17px; color: var(--text-2);
    max-width: 600px; margin-bottom: 36px; line-height: 1.55;
  }
  .modules {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 14px;
  }
  .module-card {
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: var(--r); padding: 24px;
    cursor: pointer; transition: all 0.18s;
    position: relative; overflow: hidden;
  }
  .module-card:hover {
    background: var(--surface); border-color: var(--border-2);
    transform: translateY(-2px);
  }
  .module-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .module-card:hover::before { opacity: 0.5; }
  .module-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600;
    color: var(--accent); margin-bottom: 16px;
    display: flex; align-items: baseline; gap: 8px;
  }
  .module-num .label { color: var(--text-3); font-weight: 500; }
  .module-title {
    font-size: 20px; font-weight: 600;
    color: var(--text); margin-bottom: 8px;
    letter-spacing: -0.015em;
  }
  .module-desc { font-size: 14px; color: var(--text-2); line-height: 1.55; margin-bottom: 18px; }
  .module-meta {
    display: flex; align-items: center; gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-3);
    padding-top: 16px; border-top: 1px solid var(--border);
  }
  .module-progress-bar { flex: 1; height: 3px; background: var(--surface-3); border-radius: 999px; overflow: hidden; }
  .module-progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

  /* TOC */
  .toc {
    position: sticky; top: 80px; align-self: start;
    max-height: calc(100vh - 96px); overflow-y: auto;
    padding-right: 4px;
  }
  .toc::-webkit-scrollbar { width: 4px; }
  .toc::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }
  .toc-module { margin-bottom: 22px; }
  .toc-module-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-3); margin-bottom: 8px; padding: 0 8px;
  }
  .toc-lesson {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px; font-size: 13.5px; color: var(--text-2);
    border-radius: var(--r-sm); cursor: pointer;
    transition: all 0.12s; position: relative;
  }
  .toc-lesson:hover { color: var(--text); background: var(--surface); }
  .toc-lesson.active { color: var(--text); background: var(--surface); }
  .toc-lesson.active::before {
    content: '';
    position: absolute; left: -8px; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 16px;
    background: var(--accent); border-radius: 0 2px 2px 0;
  }
  .toc-lesson-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-3);
    width: 20px; flex-shrink: 0;
  }
  .toc-lesson.active .toc-lesson-num,
  .toc-lesson.done .toc-lesson-num { color: var(--accent); }
  .toc-check {
    margin-left: auto; color: var(--accent); opacity: 0;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
  }
  .toc-lesson.done .toc-check { opacity: 1; }

  /* LESSON HEAD */
  .lesson-head { padding-bottom: 32px; margin-bottom: 40px; border-bottom: 1px solid var(--border); }
  .breadcrumb {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text-3);
    margin-bottom: 22px;
  }
  .breadcrumb .accent { color: var(--accent); }
  .breadcrumb .sep { color: var(--text-4); }
  .lesson-title {
    font-size: 44px; font-weight: 700;
    letter-spacing: -0.028em; color: var(--text);
    line-height: 1.08; margin-bottom: 12px;
  }
  .lesson-subtitle { font-size: 19px; color: var(--text-2); line-height: 1.5; max-width: 70ch; }
  @media (max-width: 600px) {
    .lesson-title { font-size: 32px; }
    .lesson-subtitle { font-size: 17px; }
  }

  /* CONTENT */
  .section { margin-bottom: 44px; }
  .h3-line {
    display: flex; align-items: center; gap: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-3); font-weight: 600;
    margin-bottom: 22px;
  }
  .h3-line::before { content: ''; width: 14px; height: 1px; background: var(--accent); }
  .h3-line::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .prose p { margin-bottom: 16px; color: var(--text); max-width: 70ch; font-size: 15.5px; }
  .prose p:last-child { margin-bottom: 0; }
  .prose code, .challenge-prompt code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.87em;
    background: var(--bg-1); color: var(--accent);
    padding: 2px 6px; border-radius: var(--r-sm);
    border: 1px solid var(--border);
  }
  .prose ul, .prose ol { margin: 0 0 16px 22px; max-width: 70ch; }
  .prose li { margin-bottom: 6px; color: var(--text); font-size: 15.5px; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose em { color: var(--text); font-style: italic; }
  .callout {
    background: var(--accent-bg);
    border: 1px solid rgba(129, 140, 248, 0.18);
    border-left: 2px solid var(--accent);
    border-radius: var(--r-sm);
    padding: 14px 20px; margin: 20px 0;
    font-size: 15.5px; color: var(--text); line-height: 1.55;
    max-width: 70ch; font-style: italic;
  }

  /* CODE */
  pre.code {
    background: var(--bg-1); border: 1px solid var(--border);
    padding: 16px 18px; margin: 14px 0 20px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; line-height: 1.7;
    color: var(--text); border-radius: var(--r); max-width: 100%;
  }
  pre.code .kw { color: #C4B5FD; font-weight: 500; }
  pre.code .str { color: #86EFAC; }
  pre.code .num { color: #FBBF24; }
  pre.code .cmt { color: var(--text-3); font-style: italic; }
  pre.code .fn { color: #60A5FA; }
  .example-caption {
    font-size: 13.5px; color: var(--text-3);
    margin: -8px 0 22px; line-height: 1.55;
    max-width: 70ch;
    padding-left: 14px; border-left: 1px solid var(--border);
  }
  .example-caption strong {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-right: 8px; display: block; margin-bottom: 2px;
  }

  /* PITFALLS */
  .pitfalls {
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: var(--r); padding: 20px 24px; margin: 24px 0;
  }
  .pitfalls-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--warning); font-weight: 600; margin-bottom: 12px;
  }
  .pitfalls-label::before {
    content: ''; width: 6px; height: 6px;
    background: var(--warning); border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.15);
  }
  .pitfalls ul { margin: 0 0 0 20px; max-width: 70ch; }
  .pitfalls li { margin-bottom: 10px; font-size: 14.5px; color: var(--text); line-height: 1.55; }
  .pitfalls code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg); padding: 1px 5px;
    font-size: 0.86em; color: var(--accent);
    border-radius: 3px; border: 1px solid var(--border);
  }

  /* CHALLENGES */
  .challenge {
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: var(--r); overflow: hidden;
    margin-bottom: 14px;
  }
  .challenge.solved { border-color: rgba(129, 140, 248, 0.3); }
  .challenge-header {
    padding: 14px 22px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg-2);
  }
  .challenge-title-wrap {
    display: flex; align-items: center; gap: 12px;
    font-size: 14px; font-weight: 600; color: var(--text);
  }
  .challenge-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-3);
    padding: 3px 9px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px;
  }
  .challenge.solved .challenge-num {
    color: var(--accent); border-color: var(--accent);
    background: var(--accent-bg);
  }
  .difficulty {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    padding: 3px 9px; border-radius: 4px; font-weight: 600;
  }
  .difficulty.easy { background: rgba(129, 140, 248, 0.1); color: var(--accent); border: 1px solid rgba(129, 140, 248, 0.25); }
  .difficulty.medium { background: rgba(96, 165, 250, 0.1); color: var(--info); border: 1px solid rgba(96, 165, 250, 0.25); }
  .difficulty.hard { background: rgba(251, 191, 36, 0.1); color: var(--warning); border: 1px solid rgba(251, 191, 36, 0.25); }
  .difficulty.expert { background: rgba(248, 113, 113, 0.1); color: var(--error); border: 1px solid rgba(248, 113, 113, 0.25); }
  .challenge-body { padding: 20px 22px; }
  .challenge-prompt { font-size: 15.5px; color: var(--text); margin-bottom: 14px; line-height: 1.55; }
  textarea.editor {
    width: 100%; min-height: 140px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--r-sm); padding: 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; line-height: 1.65;
    resize: vertical; tab-size: 2;
    transition: border-color 0.15s;
  }
  textarea.editor:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.08); }
  textarea.editor::placeholder { color: var(--text-4); }

  .actions { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .btn {
    background: var(--accent); color: var(--bg);
    border: none; padding: 8px 16px;
    font-family: 'Inter', sans-serif;

    border: 1px solid rgba(248, 113, 113, 0.3);

    width: 20px; height: 20px; border-radius: 50%;

  { module: 0, number: '01', title: 'The shape of SQL', subtitle: 'Declarative thinking and the smallest possible query.',
    concept: `<div class="prose">
      <p>Most programming languages ask you <em>how</em>: how to walk the array, update the counter, run the loop. SQL asks you <em>what</em>: what rows do you want back? The database works out the how.</p>
      <p>This is called <strong>declarative</strong> programming, and it's the first mental shift to make. You don't iterate over rows — you describe a set and the database materializes it. A skilled SQL writer thinks in sets, not in loops.</p>
      <div class="callout">A query is a description of a set. The database's job is to find it.</div>
      <p>The smallest legal query has two clauses: <code>SELECT</code>, which lists the columns you want, and <code>FROM</code>, which names the table they live in.</p>
    </div>`,
    pitfalls: `<ul>
      <li>Reversing the clauses. The order is always <code>SELECT … FROM …</code>, never the other way around.</li>
      <li>SQL keywords are case-insensitive but string values typically aren't. <code>'Premium'</code> ≠ <code>'premium'</code>.</li>
      <li>Using <code>*</code> in production code. It hides intent and silently changes when columns are added.</li>
    </ul>` },

  { module: 0, number: '02', title: 'Filtering with WHERE', subtitle: 'Asking the database to be selective.',
    concept: `<div class="prose">
      <p>Every query so far returned every row. That's rarely what you want. The <code>WHERE</code> clause is a sieve: only rows whose condition evaluates to <em>true</em> pass through.</p>
      <p>Imagine the database walking each row and asking, "does this satisfy the condition?" Yes-rows appear in the result. No-rows — or <em>unknown</em>-rows, which we'll cover — are dropped.</p>
      <p>Operators are what you'd expect: <code>=</code>, <code>!=</code> (or <code>&lt;&gt;</code>), <code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code>. String literals go in single quotes; numbers don't.</p>
    </div>`,
    pitfalls: `<ul>
      <li>Double quotes around strings. <code>WHERE x = "abc"</code> is wrong — it references a column named <em>abc</em>.</li>
      <li>Writing <code>WHERE column = NULL</code>. Silently returns nothing. Always <code>IS NULL</code>.</li>
      <li>Assuming string comparisons ignore case.</li>
    </ul>` },

  { module: 0, number: '03', title: 'Combining conditions', subtitle: 'AND, OR, NOT, and the importance of parentheses.',
    concept: `<div class="prose">
      <p>A single condition is often not enough. SQL's three boolean operators — <code>AND</code>, <code>OR</code>, <code>NOT</code> — compose richer questions.</p>
      <p>The model is logical: a row passes if the overall expression is true. <code>AND</code> requires both sides true. <code>OR</code> requires at least one true. <code>NOT</code> inverts.</p>
      <p>One source of bugs is precedence. <code>AND</code> binds tighter than <code>OR</code> — so <code>A OR B AND C</code> parses as <code>A OR (B AND C)</code>. When in doubt, parenthesize.</p>
    </div>`,
    pitfalls: `<ul>
      <li>Trusting precedence over readability. Even unnecessary parentheses document intent.</li>
      <li><code>NOT (x = NULL)</code> still gives unknown. Use <code>IS NOT NULL</code>.</li>
    </ul>` },

  { module: 1, number: '04', title: 'Sorting and limiting', subtitle: 'Imposing order on an inherently unordered set.',
    concept: `<div class="prose">
      <p>A SQL result has no guaranteed order by default. The database returns rows however it finds convenient — and that sequence can change between runs. If you need an order, you must request it.</p>
      <p><code>ORDER BY</code> sorts the result. Default is ascending; add <code>DESC</code> for descending. Sort by multiple columns — first is primary, later ones break ties.</p>
      <p><code>LIMIT</code> caps the row count. Combined with <code>ORDER BY</code>, it's how you ask top-N questions.</p>
    </div>`,
    pitfalls: `<ul>
      <li>Assuming a default order. Without <code>ORDER BY</code>, order is undefined.</li>
      <li>Clause order is fixed: <code>SELECT … FROM … WHERE … ORDER BY … LIMIT</code>.</li>
      <li><code>LIMIT</code> alone gets arbitrary rows, not "the first" anything.</li>
    </ul>` },

  { module: 1, number: '05', title: 'DISTINCT and set semantics', subtitle: 'Why SQL keeps duplicates by default.',
    concept: `<div class="prose">
      <p>Query results are <em>multisets</em>, not sets. Duplicates are preserved. If many rows share a value in a column, asking for "every value of that column" returns repeats.</p>
      <p>The choice is intentional: deduplication is expensive, and you should opt in. <code>DISTINCT</code> is the opt-in.</p>
      <p>Applied to multiple columns, <code>DISTINCT</code> deduplicates the entire <em>combination</em>. <code>DISTINCT a, b</code> returns each unique pair once.</p>
    </div>`,
    pitfalls: `<ul>
      <li>Adding <code>DISTINCT</code> reflexively to "clean up" results without understanding the duplicates.</li>
      <li>Expecting <code>DISTINCT</code> to apply to one column when several are selected. It applies to the entire row.</li>
      <li>Treating <code>DISTINCT</code> as free. On large tables it requires sorting or hashing.</li>
    </ul>` },

  { module: 1, number: '06', title: 'Pattern matching & membership', subtitle: 'LIKE, IN, and BETWEEN — three concise forms.',
    concept: `<div class="prose">
      <p>Three small operators tighten common <code>WHERE</code> patterns considerably.</p>
      <p><code>LIKE</code> does simple pattern matching: <code>%</code> matches any sequence (including none), <code>_</code> matches exactly one character.</p>
      <p><code>IN</code> tests whether a value appears in a list — sugar for a chain of <code>OR</code> equalities. The list can be a subquery (much more on that later).</p>
      <p><code>BETWEEN x AND y</code> is shorthand for <code>&gt;= x AND &lt;= y</code> — <em>inclusive on both ends</em>.</p>
    </div>`,
    pitfalls: `<ul>
      <li>Forgetting <code>BETWEEN</code> is inclusive on both sides.</li>
      <li><code>LIKE 'word'</code> without wildcards behaves like equality.</li>
      <li><code>x IN (1, 2, NULL)</code> can return unknown instead of false — surprising.</li>
    </ul>` },

  { module: 2, number: '07', title: 'Aggregate functions', subtitle: 'Compressing many rows into a single value.',
    concept: `<div class="prose">
      <p>An <strong>aggregate function</strong> collapses a column into a single result. The five canonical ones: <code>COUNT</code>, <code>SUM</code>, <code>AVG</code>, <code>MIN</code>, <code>MAX</code>.</p>
      <p>A subtle but important rule: aggregates <em>ignore <code>NULL</code></em>. <code>COUNT(column)</code> counts non-null values. <code>AVG(column)</code> averages non-null values. The exception is <code>COUNT(*)</code>, which counts rows regardless.</p>
      <p>Give a result column a friendlier name with <code>AS</code> — an alias.</p>
    </div>`,
    pitfalls: `<ul>
      <li>Confusing <code>COUNT(*)</code> with <code>COUNT(column)</code>. They differ on nullable columns.</li>
      <li>Mixing aggregates and non-aggregated columns without <code>GROUP BY</code>.</li>
      <li><code>AVG</code> on integer columns may itself be decimal.</li>
    </ul>` },

  { module: 2, number: '08', title: 'GROUP BY', subtitle: 'Aggregating per category.',
    concept: `<div class="prose">
      <p>Aggregates over an entire table answer "how many rows total?" More often you want per-category answers: "how many <em>per category</em>?" That's <code>GROUP BY</code>.</p>
      <p>Mental model: the database collects rows into buckets, one per distinct value of your grouping column. Then runs your aggregates inside each bucket independently. One row per bucket.</p>
      <div class="callout">GROUP BY turns a table of rows into a table of buckets.</div>
      <p>Firm rule: every column in <code>SELECT</code> must either appear in <code>GROUP BY</code> or be wrapped in an aggregate.</p>
    </div>`,
    pitfalls: `<ul>
      <li>Selecting a non-grouped column without aggregating it. Some databases reject this; SQLite returns an arbitrary value.</li>
      <li>Confusing <code>GROUP BY</code> with <code>ORDER BY</code>. Grouping collapses; ordering rearranges.</li>
      <li>Trying to filter aggregates in <code>WHERE</code>. They don't exist yet — use <code>HAVING</code>.</li>
    </ul>` },

  { module: 2, number: '09', title: 'HAVING', subtitle: 'Filtering after grouping.',
    concept: `<div class="prose">
      <p><code>WHERE</code> filters individual rows. <code>HAVING</code> filters groups. The distinction matters because aggregates don't exist until after grouping — so they can't appear in <code>WHERE</code>.</p>
      <p>Execution order is fixed: <code>FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY → LIMIT</code>.</p>
      <p>If you use <code>HAVING</code> on a non-aggregate condition, you probably want <code>WHERE</code> instead — it's faster.</p>
    </div>`,
    pitfalls: `<ul>
      <li>Using <code>HAVING</code> when <code>WHERE</code> would do. Slower and signals confusion.</li>
      <li>Some engines allow aliases in <code>HAVING</code>; standard SQL requires repeating the aggregate.</li>
    </ul>` },

  { module: 3, number: '10', title: 'INNER JOIN', subtitle: 'Stitching two tables together where they match.',
    concept: `<div class="prose">
      <p>In a well-designed database, related information lives in separate tables connected by IDs. To answer questions that span tables, you must combine them — a <em>join</em>.</p>
      <p>Mental model: put two tables side by side, pair every row from the left with every row from the right where the join condition is true. Rows with no match on either side are dropped. That's <em>inner</em> — only the intersection.</p>
      <div class="callout">Inner join: keep the matches, drop the rest.</div>
      <p>Table aliases (e.g. <code>orders o</code>) keep complex joins readable, and become necessary when both tables have columns of the same name.</p>
    </div>`,
    pitfalls: `<ul>
      <li>Omitting <code>ON</code>. The database returns the <em>cartesian product</em> — every row paired with every row.</li>
      <li>Forgetting that inner joins drop unmatched rows on <em>both</em> sides.</li>
      <li>Using comma syntax (<code>FROM a, b WHERE ...</code>). Works, but <code>JOIN … ON</code> separates join logic from filter logic.</li>
    </ul>` },

  { module: 3, number: '11', title: 'LEFT JOIN', subtitle: 'Preserving the unmatched.',
    concept: `<div class="prose">
      <p>Inner joins are symmetric: unmatched rows on either side are dropped. But often you don't want symmetry — you want to keep everything on one side and pull in matches where they exist.</p>
      <p>The left table is preserved in full. For each row, the database finds matches in the right table. No matches? The right-side columns come back <code>NULL</code> rather than the row being dropped.</p>
      <p><code>RIGHT JOIN</code> exists as the mirror image but is rare. By convention, put your "kept" table on the left.</p>
    </div>`,
    pitfalls: `<ul>
      <li>Filtering the right-side table in <code>WHERE</code>. Turns your LEFT JOIN back into an inner join. Put the condition in <code>ON</code> instead.</li>
      <li>Using <code>COUNT(*)</code> after a LEFT JOIN when you wanted to count only matches. It counts every row including null-padded ones.</li>
    </ul>` },

  { module: 3, number: '12', title: 'Self joins & longer chains', subtitle: 'Joining a table to itself.',
    concept: `<div class="prose">
      <p>A table can be joined to itself. Sounds odd until you notice that some relationships are between rows of the <em>same</em> kind — like a duel between two players, a referral between two users, or an employee's manager (who is also an employee).</p>
      <p>You join the table twice with different aliases, treating it as if it were two separate tables. Aliases become essential because the table appears under two roles.</p>
      <p>This pattern generalizes to any graph traversal where both sides reference the same kind of thing.</p>
    </div>`,
    pitfalls: `<ul>
      <li>Forgetting aliases on a self-join. The database can't tell which copy of the column you mean.</li>
      <li>Joining without considering row multiplication. 5 child rows × 3 grandchild rows per parent = 15 rows.</li>
    </ul>` },

  { module: 4, number: '13', title: 'Subqueries', subtitle: 'A query whose result becomes part of another query.',
    concept: `<div class="prose">
      <p>A <em>subquery</em> is a query nested inside another query — usually in <code>WHERE</code>, sometimes <code>FROM</code> or <code>SELECT</code>. The inner query runs first, produces a result, and the outer query uses it as if it were a literal.</p>
      <p>Three flavors. <strong>Scalar subquery</strong> returns one value for comparison. <strong>List subquery</strong> returns one column, paired with <code>IN</code>/<code>NOT IN</code>. <strong>Table subquery</strong> returns a full result treated as a derived table in <code>FROM</code>.</p>
      <p>Powerful, but can become hard to read — which is why CTEs (next lesson) often supplant them.</p>
    </div>`,
    pitfalls: `<ul>
      <li><code>NOT IN</code> with a list containing <code>NULL</code> returns no rows. One of SQL's nastiest surprises.</li>
      <li>Scalar subqueries returning more than one row error at runtime.</li>
      <li>Deeply nested subqueries are hard to read. Beyond two levels, restructure with CTEs.</li>
    </ul>` },

  { module: 4, number: '14', title: 'Common Table Expressions', subtitle: 'Naming your thoughts with WITH.',
    concept: `<div class="prose">
      <p>A <strong>Common Table Expression</strong> (CTE) is a named subquery defined with <code>WITH</code> at the top of a query. It behaves like a temporary table for the duration of the surrounding query.</p>
      <p>CTEs aren't more powerful than subqueries — but they are dramatically more <em>readable</em>. A query with CTEs reads top to bottom: "first compute X, then Y, then answer the real question." Subqueries read inside-out.</p>
      <div class="callout">A CTE turns an inside-out subquery into a top-down narrative.</div>
      <p>Chain multiple CTEs with commas; later CTEs can reference earlier ones. Standard way to express non-trivial analytical queries.</p>
    </div>`,
    pitfalls: `<ul>
      <li>Treating CTEs as performance optimization. Some engines materialize them; others inline. Use for clarity first.</li>
      <li>Missing the comma between multiple CTEs.</li>
    </ul>` },

  { module: 4, number: '15', title: 'Window functions', subtitle: 'Computing across rows without collapsing them.',
    concept: `<div class="prose">
      <p><code>GROUP BY</code> collapses rows. If you want per-group averages alongside the raw rows — keeping all rows visible but showing their group's stats next to each — <code>GROUP BY</code> can't help. <strong>Window functions</strong> can.</p>
      <p>A window function computes a value across a "window" of related rows for each input row, without collapsing. The query keeps its row count; you just gain columns.</p>
      <p>The window is defined by <code>OVER</code>. <code>PARTITION BY</code> divides rows into groups (like <code>GROUP BY</code>, but non-collapsing). <code>ORDER BY</code> within <code>OVER</code> imposes an order, important for ranking and running totals.</p>
      <div class="callout">Window functions are the biggest leap from "writing SQL" to "thinking in SQL."</div>
      <p>Common ones: <code>ROW_NUMBER()</code>, <code>RANK()</code>, <code>DENSE_RANK()</code>, <code>LAG()</code>, <code>LEAD()</code>. Aggregates also work as windows.</p>
    </div>`,
    pitfalls: `<ul>
      <li><code>ORDER BY</code> inside <code>OVER()</code> orders the window. Trailing <code>ORDER BY</code> orders the final output.</li>
      <li>Window functions can't be used in <code>WHERE</code>. Wrap in a CTE and filter outside.</li>
      <li><code>RANK</code> vs <code>ROW_NUMBER</code> differ on ties. Pick deliberately.</li>
    </ul>` },

  { module: 4, number: '16', title: 'Putting it together', subtitle: 'A real analytical query, end to end.',
    concept: `<div class="prose">
      <p>Every lesson introduced one tool. The final test is composition — using several together to answer questions worth asking. This is what analysts and engineers do daily.</p>
      <p>A well-structured analytical query has shape: CTEs at the top for intermediate results, joins to combine them, aggregates and windows to shape the answer, <code>ORDER BY</code> at the end. Top to bottom, the query tells the story.</p>
      <div class="callout">The query is the question, written carefully enough that a machine can answer it.</div>
    </div>`,
    pitfalls: '' },
];

const CONTENT = { rpg: RPG_CONTENT, sales: SALES_CONTENT, streaming: STREAMING_CONTENT };
const DATASET_KEY = 'queryschool-v6-dataset';
const PROGRESS_KEY_BASE = 'queryschool-v6-progress-';

let db, SQL_INSTANCE;
let mode = 'home';
let currentDataset = null;
let currentLesson = null;
let completed = new Set();
let solvedChallenges = new Set();
let solvedPractice = new Set();
let savedEditors = {};
let savedPracticeEditors = {};
let sandboxQuery = '';
let practiceFilter = 'all';

function defaultSandbox() {
  const ds = DATASETS[currentDataset];
  const sampleTable = ds.tables[0];
  return `-- Welcome to the sandbox.
-- Dataset: ${ds.name}
-- Tables: ${ds.tables.join(', ')}

SELECT * FROM ${sampleTable} LIMIT 10;`;
}

function loadProgress() {
  if (!currentDataset) return;
  completed = new Set(); solvedChallenges = new Set(); solvedPractice = new Set();
  savedEditors = {}; savedPracticeEditors = {};
  sandboxQuery = defaultSandbox();
  try {
    const raw = localStorage.getItem(PROGRESS_KEY_BASE + currentDataset);
    if (raw) {
      const d = JSON.parse(raw);
      completed = new Set(d.completed || []);
      solvedChallenges = new Set(d.solvedChallenges || []);
      solvedPractice = new Set(d.solvedPractice || []);
      savedEditors = d.savedEditors || {};
      savedPracticeEditors = d.savedPracticeEditors || {};
      sandboxQuery = d.sandboxQuery || defaultSandbox();
    }
  } catch(e) {}
}
function saveProgress() {
  if (!currentDataset) return;
  try {
    localStorage.setItem(PROGRESS_KEY_BASE + currentDataset, JSON.stringify({
      completed: [...completed],
      solvedChallenges: [...solvedChallenges],
      solvedPractice: [...solvedPractice],
      savedEditors, savedPracticeEditors, sandboxQuery
    }));
  } catch(e) {}
}

async function init() {
  SQL_INSTANCE = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
  const stored = localStorage.getItem(DATASET_KEY);
  if (stored && DATASETS[stored]) {
    currentDataset = stored;
    loadDatabase();
    loadProgress();
    render();
  } else {
    mode = 'picker';
    render();
  }
}

function loadDatabase() {
  db = new SQL_INSTANCE.Database();
  db.exec(DATASETS[currentDataset].schema);
}

function selectDataset(id) {
  currentDataset = id;
  localStorage.setItem(DATASET_KEY, id);
  loadDatabase();
  loadProgress();
  mode = 'home';
  render();
}

function switchDataset() {
  mode = 'picker';
  render();
}

function setMode(m, idx) {
  if (!currentDataset && m !== 'picker') { mode = 'picker'; render(); return; }
  mode = m;
  if (idx !== undefined) currentLesson = idx;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

    </div>
    <div class="progress-pill">

      <div class="progress-pill-bar"><div class="progress-pill-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab ${mode==='home'||mode==='lesson'?'active':''}" onclick="setMode('home')">Course</button>
      <button class="nav-tab ${mode==='practice'?'active':''}" onclick="setMode('practice')">Practice</button>
      <button class="nav-tab ${mode==='sandbox'?'active':''}" onclick="setMode('sandbox')">Sandbox</button>
      <button class="nav-tab ${mode==='schema'?'active':''}" onclick="setMode('schema')">Schema</button>
    </div>`;
}

function render() {
  renderNavRight();
  const app = document.getElementById('app');
  app.className = '';
  if (mode === 'picker') renderPicker(app);
  else if (mode === 'home') renderHome(app);
  else if (mode === 'lesson') renderLesson(app);
  else if (mode === 'practice') renderPractice(app);
  else if (mode === 'sandbox') renderSandbox(app);
  else if (mode === 'schema') renderSchema(app);
}

// PICKER
// =====================================================================
function renderPicker(app) {
  const cards = Object.values(DATASETS).map(ds => {
    const isCurrent = currentDataset === ds.id;

      <div class="picker-card ${isCurrent ? 'current' : ''}" onclick="selectDataset('${ds.id}')">

}

// HOME
// =====================================================================
function renderHome(app) {
  const ds = DATASETS[currentDataset];
  const totalChallenges = CONTENT[currentDataset].challenges.reduce((acc, arr) => acc + arr.length, 0);

    const lessonsInModule = LESSON_FRAMES.map((l, i) => ({l, i})).filter(x => x.l.module === idx);
    const doneInModule = lessonsInModule.filter(x => completed.has(x.i)).length;
    const firstLessonIdx = lessonsInModule[0]?.i ?? 0;
    const pct = 100 * doneInModule / lessonsInModule.length;
    return `
      <div class="module-card" onclick="setMode('lesson', ${firstLessonIdx})">
        <div class="module-num"><span>${m.num}</span><span class="label">module</span></div>
        <div class="module-title">${m.name}</div>
        <div class="module-desc">${m.desc}</div>
        <div class="module-meta">
          <span>${doneInModule}/${lessonsInModule.length}</span>
          <div class="module-progress-bar"><div class="module-progress-fill" style="width:${pct}%"></div></div>
        </div>
      </div>`;
  }).join('');

  const startIdx = completed.size === 0 ? 0 : (completed.size < LESSON_FRAMES.length ? Math.max(...[...completed]) + 1 : 0);
  const startLabel = completed.size === 0 ? 'Start the course' : (completed.size < LESSON_FRAMES.length ? 'Continue' : 'Review');

  app.innerHTML = `
    <div class="home-hero">
      <div class="badge"><span class="badge-dot"></span> ${ds.icon} ${ds.name} · ${LESSON_FRAMES.length} lessons · ${totalChallenges} challenges</div>
      <h1>Learn SQL by <span class="accent">writing</span> it.</h1>
      <p class="lede">A complete course in querying — from your first <span style="color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:500;">SELECT</span> to window functions and analytical composition. Every example runs against the ${ds.name.toLowerCase()} dataset in your browser. No installs.</p>
      <div class="cta-row">
        <button class="btn" onclick="setMode('lesson', ${startIdx})">${startLabel} →</button>
        <button class="btn btn-ghost" onclick="setMode('practice')">Practice bank</button>
      </div>
      <div class="home-stats">
        <div class="stat"><div class="stat-num"><span class="accent">${LESSON_FRAMES.length}</span></div><div class="stat-label">Lessons</div></div>
        <div class="stat"><div class="stat-num"><span class="accent">${totalChallenges}</span></div><div class="stat-label">In-lesson challenges</div></div>
        <div class="stat"><div class="stat-num"><span class="accent">${bankSize}</span></div><div class="stat-label">Bank questions</div></div>
        <div class="stat"><div class="stat-num"><span class="accent">${ds.tables.length}</span></div><div class="stat-label">Tables to query</div></div>
      </div>
    </div>

    <div class="home-section">
      <div class="section-eyebrow">/ curriculum</div>
      <div class="section-title">Five modules.</div>

      <div class="modules">${modulesHtml}</div>

  `;
}

// =====================================================================
// LESSON
// =====================================================================
function renderLesson(app) {
  const frame = LESSON_FRAMES[currentLesson];
  const module = MODULES[frame.module];
  const content = CONTENT[currentDataset];
  const exampleHtml = content.examples[currentLesson] || '';
  const challenges = content.challenges[currentLesson] || [];

  let tocHtml = '';
  MODULES.forEach((m, mi) => {
    const moduleLessons = LESSON_FRAMES.map((l, i) => ({l, i})).filter(x => x.l.module === mi);
    tocHtml += `<div class="toc-module">
      <div class="toc-module-name">${m.num} · ${m.name}</div>
      ${moduleLessons.map(({l, i}) => `
        <div class="toc-lesson ${i === currentLesson ? 'active' : ''} ${completed.has(i) ? 'done' : ''}" onclick="setMode('lesson', ${i})">
          <span class="toc-lesson-num">${l.number}</span>
          <span style="flex:1;">${l.title}</span>
          <span class="toc-check">✓</span>
        </div>`).join('')}
    </div>`;
  });

  const challengesHtml = challenges.map((ch, ci) => {
    const key = `${currentLesson}-${ci}`;
    const solvedKey = `L${currentLesson}-C${ci}`;
    const isSolved = solvedChallenges.has(solvedKey);
    const savedCode = savedEditors[key] !== undefined ? savedEditors[key] : ch.starter;
    return `
      <div class="challenge ${isSolved ? 'solved' : ''}" id="challenge-${ci}">
        <div class="challenge-header">
          <div class="challenge-title-wrap">
            <span class="challenge-num">${isSolved ? '✓' : String(ci + 1).padStart(2, '0')}</span>
            <span>Challenge</span>
          </div>
          <span class="difficulty ${ch.difficulty}">${ch.difficulty}</span>
        </div>
        <div class="challenge-body">
          <div class="challenge-prompt">${ch.prompt}</div>
          <textarea class="editor" id="editor-${ci}" spellcheck="false" oninput="onEditorInput(${ci})" placeholder="-- Write your query">${escapeHtml(savedCode)}</textarea>
          <div class="actions">
            <button class="btn" onclick="runChallenge(${ci})">Run query</button>
            <button class="btn btn-ghost" onclick="resetChallenge(${ci})">Reset</button>
            <div style="flex:1;"></div>
            <button class="btn btn-link" onclick="toggleHint(${ci})">Hint</button>
            <button class="btn btn-link" onclick="toggleSolution(${ci})">Solution</button>
          </div>
          <div id="hint-${ci}"></div>
          <div id="solution-${ci}"></div>
          <div id="output-${ci}"></div>
        </div>
      </div>`;
  }).join('');

  const prev = currentLesson > 0 ? currentLesson - 1 : null;
  const next = currentLesson < LESSON_FRAMES.length - 1 ? currentLesson + 1 : null;

  const pitfallsHtml = frame.pitfalls ? `<div class="pitfalls">
    <div class="pitfalls-label">Pitfalls</div>
    ${frame.pitfalls}
  </div>` : '';

  app.innerHTML = `
    <div class="grid">
      <aside class="toc">${tocHtml}</aside>
      <main>
        <div class="lesson-head">
          <div class="breadcrumb">
            <span class="accent">module ${module.num}</span>
            <span class="sep">/</span>
            <span>${module.name.toLowerCase()}</span>
            <span class="sep">/</span>
            <span>lesson ${frame.number}</span>
          </div>
          <h1 class="lesson-title">${frame.title}</h1>
          <p class="lesson-subtitle">${frame.subtitle}</p>
        </div>
        <div class="section">
          <div class="h3-line">Concept</div>
          ${frame.concept}
        </div>
        <div class="section">
          <div class="h3-line">Examples</div>
          ${exampleHtml}
        </div>
        ${pitfallsHtml}
        ${challenges.length > 0 ? `<div class="section">
          <div class="h3-line">Practice · ${challenges.length} challenge${challenges.length === 1 ? '' : 's'}</div>
          ${challengesHtml}
        </div>` : ''}
        <div class="lesson-nav">
          ${prev !== null ? `<button class="nav-link" onclick="setMode('lesson', ${prev})">
            <div class="nav-link-eyebrow">← previous</div>
            <div class="nav-link-title">${LESSON_FRAMES[prev].title}</div>
          </button>` : '<div style="flex:1"></div>'}
          ${next !== null ? `<button class="nav-link next" onclick="setMode('lesson', ${next})">
            <div class="nav-link-eyebrow">next →</div>
            <div class="nav-link-title">${LESSON_FRAMES[next].title}</div>
          </button>` : `<button class="nav-link next" onclick="setMode('practice')">
            <div class="nav-link-eyebrow">next →</div>
            <div class="nav-link-title">Practice bank</div>
          </button>`}
        </div>
      </main>
    </div>`;
}

function onEditorInput(ci) {
  const key = `${currentLesson}-${ci}`;
  savedEditors[key] = document.getElementById(`editor-${ci}`).value;
  saveProgress();
}
function resetChallenge(ci) {
  const key = `${currentLesson}-${ci}`;
  delete savedEditors[key]; saveProgress();
  const ch = CONTENT[currentDataset].challenges[currentLesson][ci];
  document.getElementById(`editor-${ci}`).value = ch.starter;
  document.getElementById(`output-${ci}`).innerHTML = '';
}
function toggleHint(ci) {
  const box = document.getElementById(`hint-${ci}`);
  if (box.innerHTML) { box.innerHTML = ''; return; }
  const ch = CONTENT[currentDataset].challenges[currentLesson][ci];
  box.innerHTML = `<div class="reveal"><div class="reveal-label">Hint</div>${ch.hint}</div>`;
}
function toggleSolution(ci) {
  const box = document.getElementById(`solution-${ci}`);
  if (box.innerHTML) { box.innerHTML = ''; return; }
  const ch = CONTENT[currentDataset].challenges[currentLesson][ci];
  box.innerHTML = `<div class="reveal"><div class="reveal-label">Reference solution</div><pre class="code">${highlightSql(ch.solution)}</pre></div>`;
}
function runChallenge(ci) {
  const sql = document.getElementById(`editor-${ci}`).value;
  const output = document.getElementById(`output-${ci}`);
  const ch = CONTENT[currentDataset].challenges[currentLesson][ci];
  runInto(sql, output, ch.check, () => {
    const solvedKey = `L${currentLesson}-C${ci}`;
    solvedChallenges.add(solvedKey);
    const allSolved = CONTENT[currentDataset].challenges[currentLesson].every((_, idx) => solvedChallenges.has(`L${currentLesson}-C${idx}`));
    if (allSolved) completed.add(currentLesson);
    document.getElementById(`challenge-${ci}`).classList.add('solved');
    const numEl = document.querySelector(`#challenge-${ci} .challenge-num`);
    if (numEl) numEl.textContent = '✓';
    saveProgress();
    renderNavRight();
  });
}

// =====================================================================
// PRACTICE
// =====================================================================
function renderPractice(app) {
  const bank = CONTENT[currentDataset].practiceBank;
  const filters = [
    { id: 'all', label: 'All' },
    { id: 'easy', label: 'Easy' },
    { id: 'medium', label: 'Medium' },
    { id: 'hard', label: 'Hard' },
    { id: 'expert', label: 'Expert' },
  ];
  const filtersHtml = filters.map(f => {
    const count = f.id === 'all' ? bank.length : bank.filter(q => q.difficulty === f.id).length;
    return `<div class="filter-chip ${practiceFilter === f.id ? 'active' : ''}" onclick="setPracticeFilter('${f.id}')">${f.label} <span style="opacity:.6;margin-left:4px;">${count}</span></div>`;
  }).join('');

  const filtered = practiceFilter === 'all' ? bank : bank.filter(q => q.difficulty === practiceFilter);

  let html = '';
  let currentTier = null;
  filtered.forEach(q => {
    const realIdx = bank.indexOf(q);
    if (q.tier !== currentTier) {
      currentTier = q.tier;
      const tierLabels = { 1: 'Tier 1 · Foundations', 2: 'Tier 2 · Sets & Aggregation', 3: 'Tier 3 · Joins', 4: 'Tier 4 · Advanced' };
      html += `<div class="tier-divider"><span class="tier-label">${tierLabels[q.tier]}</span><div class="tier-line"></div></div>`;
    }
    const savedCode = savedPracticeEditors[realIdx] !== undefined ? savedPracticeEditors[realIdx] : '-- Write your query\n';
    const isSolved = solvedPractice.has(realIdx);
    const lessonRef = LESSON_FRAMES[q.lesson];
    html += `
      <div class="challenge ${isSolved ? 'solved' : ''}" id="prac-card-${realIdx}">
        <div class="challenge-header">
          <div class="challenge-title-wrap">
            <span class="challenge-num">${isSolved ? '✓' : `Q${String(realIdx + 1).padStart(2, '0')}`}</span>
          </div>
          <div style="display:flex; gap: 8px; align-items: center; flex-wrap: wrap;">
            <span class="lesson-ref" onclick="setMode('lesson', ${q.lesson})" title="Open the lesson">${lessonRef.number} · ${lessonRef.title}</span>
            <span class="difficulty ${q.difficulty}">${q.difficulty}</span>
          </div>
        </div>
        <div class="challenge-body">
          <div class="challenge-prompt">${q.prompt}</div>
          <textarea class="editor" id="prac-editor-${realIdx}" spellcheck="false" oninput="onPracticeInput(${realIdx})" placeholder="-- Write your query">${escapeHtml(savedCode)}</textarea>
          <div class="actions">
            <button class="btn" onclick="runPractice(${realIdx})">Run query</button>
            <button class="btn btn-ghost" onclick="resetPractice(${realIdx})">Reset</button>
            <div style="flex:1;"></div>
            <button class="btn btn-link" onclick="togglePracticeSolution(${realIdx})">Solution</button>
          </div>
          <div id="prac-solution-${realIdx}"></div>
          <div id="prac-output-${realIdx}"></div>
        </div>
      </div>`;
  });

  app.innerHTML = `
    <div class="practice-head">
      <div class="lesson-head">
        <div class="breadcrumb"><span class="accent">/ practice bank</span></div>
        <h1 class="lesson-title">Question bank</h1>
        <p class="lesson-subtitle">${bank.length} questions of escalating difficulty, organized in four tiers. Each shows the lesson that covers the relevant material — click the tag to jump there.</p>
      </div>
      <div class="practice-filters">${filtersHtml}</div>
      <div class="practice-meta">${solvedPractice.size} of ${bank.length} solved · showing ${filtered.length}</div>
      ${html}
    </div>`;
}

function setPracticeFilter(f) { practiceFilter = f; render(); }
function onPracticeInput(idx) { savedPracticeEditors[idx] = document.getElementById(`prac-editor-${idx}`).value; saveProgress(); }
function resetPractice(idx) {
  delete savedPracticeEditors[idx]; saveProgress();
  document.getElementById(`prac-editor-${idx}`).value = '-- Write your query\n';
  document.getElementById(`prac-output-${idx}`).innerHTML = '';
}
function togglePracticeSolution(idx) {
  const box = document.getElementById(`prac-solution-${idx}`);
  if (box.innerHTML) { box.innerHTML = ''; return; }
  const q = CONTENT[currentDataset].practiceBank[idx];
  box.innerHTML = `<div class="reveal"><div class="reveal-label">Reference solution</div><pre class="code">${highlightSql(q.solution)}</pre></div>`;
}
function runPractice(idx) {
  const sql = document.getElementById(`prac-editor-${idx}`).value;
  const output = document.getElementById(`prac-output-${idx}`);
  const q = CONTENT[currentDataset].practiceBank[idx];
  runInto(sql, output, q.check, () => {
    solvedPractice.add(idx);
    document.getElementById(`prac-card-${idx}`).classList.add('solved');
    const numEl = document.querySelector(`#prac-card-${idx} .challenge-num`);
    if (numEl) numEl.textContent = '✓';
    saveProgress();
  });
}

// =====================================================================
// SANDBOX
// =====================================================================
function renderSandbox(app) {
  const ds = DATASETS[currentDataset];
  const tablesHtml = ds.tables.map(t => `<code style="font-family:'JetBrains Mono',monospace;color:var(--accent);background:var(--bg-1);border:1px solid var(--border);padding:1px 5px;border-radius:3px;margin:0 2px;">${t}</code>`).join(' ');
  app.innerHTML = `
    <div style="max-width: 980px; margin: 0 auto;">
      <div class="lesson-head">
        <div class="breadcrumb"><span class="accent">/ sandbox</span></div>
        <h1 class="lesson-title">Workshop</h1>
        <p class="lesson-subtitle">Free-form queries against ${ds.name}. Nothing is checked; explore freely. Tables: ${tablesHtml}.</p>
      </div>
      <textarea class="editor" id="sandbox-editor" spellcheck="false" style="min-height: 220px;" oninput="onSandboxInput()">${escapeHtml(sandboxQuery)}</textarea>
      <div class="actions">
        <button class="btn" onclick="runSandbox()">Run query</button>
        <button class="btn btn-ghost" onclick="resetDatabase()">Reset database</button>
      </div>
      <div id="sandbox-output"></div>
    </div>`;
}
function onSandboxInput() { sandboxQuery = document.getElementById('sandbox-editor').value; saveProgress(); }
function runSandbox() {
  const sql = document.getElementById('sandbox-editor').value;
  const output = document.getElementById('sandbox-output');
  try {
    const results = db.exec(sql);
    if (results.length === 0) {
      output.innerHTML = `<div class="result"><div class="result-meta">query ran · no rows returned</div></div>`;
      return;
    }
    output.innerHTML = results.map(r => renderResultTable(r.columns, r.values)).join('');
  } catch (e) {
    output.innerHTML = `<div class="result"><div class="result-error"><span class="label">error</span>${escapeHtml(e.message)}</div></div>`;
  }
}
function resetDatabase() {
  loadDatabase();
  document.getElementById('sandbox-output').innerHTML = `<div class="result"><div class="result-meta">database reset to initial state</div></div>`;
}

// =====================================================================
// SCHEMA
// =====================================================================
function renderSchema(app) {
  const ds = DATASETS[currentDataset];
  const cardsHtml = ds.tables.map(t => {
    const info = db.exec(`PRAGMA table_info(${t});`)[0];
    const count = db.exec(`SELECT COUNT(*) FROM ${t};`)[0].values[0][0];
    const cols = info.values.map(r => `
      <div class="schema-col">
        <span class="schema-col-name">${r[1]}${r[5] ? '<span class="schema-col-pk">pk</span>' : ''}</span>
        <span class="schema-col-type">${r[2].toLowerCase()}</span>
      </div>`).join('');
    return `<div class="schema-card">
      <div class="schema-card-head">
        <span class="schema-card-name">${t}</span>
        <span class="schema-card-rows">${count} rows</span>
      </div>
      ${cols}
    </div>`;
  }).join('');

  const fksHtml = ds.fkDescriptions.map(([from, to]) =>
    `<div class="rel">${from}<span class="arrow">→</span>${to}</div>`
  ).join('');

  app.innerHTML = `
    <div style="max-width: 1100px; margin: 0 auto;">
      <div class="lesson-head">
        <div class="breadcrumb"><span class="accent">/ schema · ${ds.name}</span></div>
        <h1 class="lesson-title">Database</h1>
        <p class="lesson-subtitle">${ds.tagline}</p>
      </div>
      <div class="schema-grid">${cardsHtml}</div>
      <div class="schema-relationships">
        <div class="h3-line" style="margin-bottom: 14px;">Foreign keys</div>
        ${fksHtml}
      </div>
    </div>`;
}

// =====================================================================
// SHARED
// =====================================================================
function runInto(sql, outputEl, checkFn, onSuccess) {
  try {
    const results = db.exec(sql);
    if (results.length === 0) {
      outputEl.innerHTML = `<div class="result"><div class="result-meta">query ran · no rows returned</div></div>`;
      return;
    }
    const { columns, values } = results[0];
    const rows = values.map(row => Object.fromEntries(columns.map((c, i) => [c, row[i]])));
    let html = renderResultTable(columns, values);
    let ok = false;
    try { ok = checkFn(rows, columns); } catch(e) { ok = false; }
    if (ok) {
      if (onSuccess) onSuccess();
      html += `<div class="feedback correct"><span class="feedback-icon">✓</span><span>Correct. Your result matches what was expected.</span></div>`;
    } else {
      html += `<div class="feedback incorrect"><span class="feedback-icon">!</span><span>The query ran, but the result doesn't match. Try again.</span></div>`;
    }
    outputEl.innerHTML = html;
  } catch (e) {
    outputEl.innerHTML = `<div class="result"><div class="result-error"><span class="label">error</span>${escapeHtml(e.message)}</div></div>`;
  }
}

function renderResultTable(columns, values) {
  return `<div class="result">
    <div class="result-meta">${values.length} row${values.length === 1 ? '' : 's'} · ${columns.length} column${columns.length === 1 ? '' : 's'}</div>
    <div class="result-table-wrap"><table class="results">
      <thead><tr>${columns.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr></thead>
      <tbody>${values.map(r => '<tr>' + r.map(v =>
        v === null ? '<td class="null">NULL</td>' : `<td>${escapeHtml(String(v))}</td>`
      ).join('') + '</tr>').join('')}</tbody>
    </table></div>
  </div>`;
}

function highlightSql(sql) {
  const keywords = /\b(SELECT|FROM|WHERE|AND|OR|NOT|IN|LIKE|BETWEEN|IS|NULL|GROUP BY|HAVING|ORDER BY|LIMIT|JOIN|INNER|LEFT|RIGHT|OUTER|ON|AS|DISTINCT|WITH|UNION|ALL|ASC|DESC|PARTITION BY|OVER|CASE|WHEN|THEN|ELSE|END)\b/gi;
  const funcs = /\b(COUNT|SUM|AVG|MIN|MAX|RANK|ROW_NUMBER|DENSE_RANK|LAG|LEAD|COALESCE|NULLIF|SUBSTR|STRFTIME)\b/gi;
  return escapeHtml(sql)
    .replace(/--[^\n]*/g, m => `<span class="cmt">${m}</span>`)
    .replace(/&#39;(.*?)&#39;/g, (m, s) => `<span class="str">'${s}'</span>`)
    .replace(/\b(\d+)\b/g, '<span class="num">$1</span>')
    .replace(funcs, '<span class="fn">$1</span>')
    .replace(keywords, '<span class="kw">$1</span>');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

init();
