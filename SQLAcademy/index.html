<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>queryschool — A course in writing SQL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<style>
  :root {
    --bg: #08080B;
    --bg-1: #0E0E12;
    --bg-2: #131318;
    --surface: #1A1A20;
    --surface-2: #22222A;
    --surface-3: #2D2D38;
    --border: #25252E;
    --border-2: #35353F;
    --border-bright: #4B4B58;
    --text: #F5F5F7;
    --text-2: #A8A8B5;
    --text-3: #6E6E7D;
    --text-4: #4A4A55;
    --accent: #818CF8;
    --accent-2: #A78BFA;
    --accent-dim: #312E81;
    --accent-bg: rgba(129, 140, 248, 0.08);
    --warning: #FBBF24;
    --error: #F87171;
    --info: #60A5FA;
    --r: 6px;
    --r-sm: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
  }

  /* ============ NAV ============ */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 14px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    text-decoration: none;
  }
  .brand-glyph {
    width: 26px; height: 26px;
    background: var(--accent);
    border-radius: var(--r-sm);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    color: var(--bg);
    font-size: 14px;
    line-height: 1;
  }
  .brand-name {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
    letter-spacing: -0.005em;
  }
  .brand-name span { color: var(--accent); }

  .nav-right { display: flex; align-items: center; gap: 14px; }
  .nav-tabs {
    display: flex; gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 3px;
  }
  .nav-tab {
    background: transparent;
    color: var(--text-2);
    border: none;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: var(--r-sm);
    transition: all 0.15s;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active {
    background: var(--surface-3);
    color: var(--text);
  }
  .progress-pill {
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-2);
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
  }
  .progress-pill-bar {
    width: 56px; height: 4px;
    background: var(--surface-3);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-pill-fill {
    height: 100%; background: var(--accent);
    box-shadow: 0 0 8px rgba(129, 140, 248, 0.4);
    transition: width 0.4s ease;
  }

  /* ============ LAYOUT ============ */
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 28px 96px;
  }
  .grid {
    display: grid;
    grid-template-columns: 244px 1fr;
    gap: 52px;
  }
  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; gap: 28px; }
    .nav-inner { padding: 12px 16px; flex-wrap: wrap; }
    .container { padding: 24px 16px 60px; }
    .nav-right { flex-wrap: wrap; }
  }

  /* ============ HOME ============ */
  .home-hero {
    padding: 80px 0 56px;
    max-width: 880px;
    position: relative;
  }
  .home-hero::before {
    content: '';
    position: absolute;
    top: 40px; left: -240px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(129, 140, 248, 0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: -1;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-2);
    margin-bottom: 32px;
  }
  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.18), 0 0 12px rgba(129, 140, 248, 0.5);
  }
  .home-hero h1 {
    font-size: clamp(44px, 7vw, 84px);
    font-weight: 700;
    line-height: 1.02;
    letter-spacing: -0.035em;
    color: var(--text);
    margin-bottom: 24px;
  }
  .home-hero h1 .accent {
    color: var(--accent);
    font-style: italic;
    font-weight: 600;
  }
  .home-hero .lede {
    font-size: 19px;
    color: var(--text-2);
    line-height: 1.55;
    margin-bottom: 36px;
    max-width: 620px;
  }
  .cta-row { display: flex; gap: 12px; flex-wrap: wrap; }

  .home-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1px;
    margin-top: 56px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
  }
  .stat {
    background: var(--bg-1);
    padding: 22px 24px;
  }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .stat-num .accent { color: var(--accent); }
  .stat-label {
    font-size: 12px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
  }

  .home-section {
    margin-top: 88px;
    padding-top: 56px;
    border-top: 1px solid var(--border);
  }
  .section-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: var(--text);
    margin-bottom: 14px;
  }
  .section-lede {
    font-size: 17px;
    color: var(--text-2);
    max-width: 600px;
    margin-bottom: 36px;
    line-height: 1.55;
  }

  .modules {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 14px;
  }
  .module-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 24px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }
  .module-card:hover {
    background: var(--surface);
    border-color: var(--border-2);
    transform: translateY(-2px);
  }
  .module-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .module-card:hover::before { opacity: 0.5; }
  .module-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex; align-items: baseline; gap: 8px;
  }
  .module-num .label { color: var(--text-3); font-weight: 500; }
  .module-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.015em;
  }
  .module-desc {
    font-size: 14px;
    color: var(--text-2);
    line-height: 1.55;
    margin-bottom: 18px;
  }
  .module-meta {
    display: flex; align-items: center; gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-3);
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .module-progress-bar {
    flex: 1; height: 3px;
    background: var(--surface-3);
    border-radius: 999px;
    overflow: hidden;
  }
  .module-progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.3s;
  }

  .features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
  }
  .feature {
    background: var(--bg-1);
    padding: 26px;
  }
  .feature-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .feature h3 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .feature p { font-size: 14px; color: var(--text-2); line-height: 1.55; }

  /* ============ TOC ============ */
  .toc {
    position: sticky;
    top: 76px;
    align-self: start;
    max-height: calc(100vh - 96px);
    overflow-y: auto;
    padding-right: 4px;
  }
  .toc::-webkit-scrollbar { width: 4px; }
  .toc::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }
  .toc-module { margin-bottom: 22px; }
  .toc-module-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-3);
    margin-bottom: 8px;
    padding: 0 8px;
  }
  .toc-lesson {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px;
    font-size: 13.5px;
    color: var(--text-2);
    border-radius: var(--r-sm);
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
  }
  .toc-lesson:hover { color: var(--text); background: var(--surface); }
  .toc-lesson.active {
    color: var(--text);
    background: var(--surface);
  }
  .toc-lesson.active::before {
    content: '';
    position: absolute;
    left: -8px; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 16px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .toc-lesson-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-3);
    width: 20px; flex-shrink: 0;
  }
  .toc-lesson.active .toc-lesson-num { color: var(--accent); }
  .toc-lesson.done .toc-lesson-num { color: var(--accent); }
  .toc-check {
    margin-left: auto;
    color: var(--accent);
    opacity: 0;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }
  .toc-lesson.done .toc-check { opacity: 1; }

  /* ============ LESSON HEAD ============ */
  .lesson-head {
    padding-bottom: 32px;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
  }
  .breadcrumb {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-3);
    margin-bottom: 22px;
  }
  .breadcrumb .accent { color: var(--accent); }
  .breadcrumb .sep { color: var(--text-4); }
  .lesson-title {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -0.028em;
    color: var(--text);
    line-height: 1.08;
    margin-bottom: 12px;
  }
  .lesson-subtitle {
    font-size: 19px;
    color: var(--text-2);
    line-height: 1.5;
    max-width: 70ch;
  }
  @media (max-width: 600px) {
    .lesson-title { font-size: 32px; }
    .lesson-subtitle { font-size: 17px; }
  }

  /* ============ CONTENT ============ */
  .section { margin-bottom: 44px; }
  .h3-line {
    display: flex; align-items: center; gap: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
    font-weight: 600;
    margin-bottom: 22px;
  }
  .h3-line::before {
    content: '';
    width: 14px; height: 1px;
    background: var(--accent);
  }
  .h3-line::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .prose p {
    margin-bottom: 16px;
    color: var(--text);
    max-width: 70ch;
    font-size: 15.5px;
  }
  .prose p:last-child { margin-bottom: 0; }
  .prose code, .challenge-prompt code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.87em;
    background: var(--bg-1);
    color: var(--accent);
    padding: 2px 6px;
    border-radius: var(--r-sm);
    border: 1px solid var(--border);
  }
  .prose ul, .prose ol { margin: 0 0 16px 22px; max-width: 70ch; }
  .prose li { margin-bottom: 6px; color: var(--text); font-size: 15.5px; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose em { color: var(--text); font-style: italic; }

  .callout {
    background: var(--accent-bg);
    border: 1px solid rgba(129, 140, 248, 0.18);
    border-left: 2px solid var(--accent);
    border-radius: var(--r-sm);
    padding: 14px 20px;
    margin: 20px 0;
    font-size: 15.5px;
    color: var(--text);
    line-height: 1.55;
    max-width: 70ch;
    font-style: italic;
  }

  /* ============ CODE ============ */
  pre.code {
    background: var(--bg-1);
    border: 1px solid var(--border);
    padding: 16px 18px;
    margin: 14px 0 20px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    border-radius: var(--r);
    max-width: 100%;
  }
  pre.code .kw { color: #C4B5FD; font-weight: 500; }
  pre.code .str { color: var(--accent); }
  pre.code .num { color: #FBBF24; }
  pre.code .cmt { color: var(--text-3); font-style: italic; }
  pre.code .fn { color: #60A5FA; }

  .example-caption {
    font-size: 13.5px;
    color: var(--text-3);
    margin: -8px 0 22px;
    line-height: 1.55;
    max-width: 70ch;
    padding-left: 14px;
    border-left: 1px solid var(--border);
  }
  .example-caption strong {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 8px;
    display: block;
    margin-bottom: 2px;
  }

  /* ============ PITFALLS ============ */
  .pitfalls {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 20px 24px;
    margin: 24px 0;
  }
  .pitfalls-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--warning);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .pitfalls-label::before {
    content: ''; width: 6px; height: 6px;
    background: var(--warning);
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.15);
  }
  .pitfalls ul { margin: 0 0 0 20px; max-width: 70ch; }
  .pitfalls li { margin-bottom: 10px; font-size: 14.5px; color: var(--text); line-height: 1.55; }
  .pitfalls code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    padding: 1px 5px;
    font-size: 0.86em;
    color: var(--accent);
    border-radius: 3px;
    border: 1px solid var(--border);
  }

  /* ============ CHALLENGES ============ */
  .challenge {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    margin-bottom: 14px;
  }
  .challenge.solved { border-color: rgba(129, 140, 248, 0.3); }
  .challenge.solved::after {
    content: '';
  }
  .challenge-header {
    padding: 14px 22px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg-2);
  }
  .challenge-title-wrap {
    display: flex; align-items: center; gap: 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .challenge-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-3);
    padding: 3px 9px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .challenge.solved .challenge-num {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .difficulty {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 9px;
    border-radius: 4px;
    font-weight: 600;
  }
  .difficulty.easy { background: rgba(129, 140, 248, 0.1); color: var(--accent); border: 1px solid rgba(129, 140, 248, 0.25); }
  .difficulty.medium { background: rgba(96, 165, 250, 0.1); color: var(--info); border: 1px solid rgba(96, 165, 250, 0.25); }
  .difficulty.hard { background: rgba(251, 191, 36, 0.1); color: var(--warning); border: 1px solid rgba(251, 191, 36, 0.25); }
  .difficulty.expert { background: rgba(248, 113, 113, 0.1); color: var(--error); border: 1px solid rgba(248, 113, 113, 0.25); }

  .challenge-body { padding: 20px 22px; }
  .challenge-prompt {
    font-size: 15.5px;
    color: var(--text);
    margin-bottom: 14px;
    line-height: 1.55;
  }
  textarea.editor {
    width: 100%;
    min-height: 140px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.65;
    resize: vertical;
    tab-size: 2;
    transition: border-color 0.15s;
  }
  textarea.editor:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.08); }
  textarea.editor::placeholder { color: var(--text-4); }

  .actions { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 8px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-radius: var(--r-sm);
    transition: all 0.12s;
    display: inline-flex; align-items: center; gap: 6px;
    letter-spacing: -0.005em;
  }
  .btn:hover { background: #A5B4FC; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    color: var(--text-2);
    border: 1px solid var(--border-2);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--border-bright); background: var(--surface); }
  .btn-link {
    background: transparent;
    color: var(--text-3);
    border: none;
    padding: 8px 12px;
    font-size: 12.5px;
  }
  .btn-link:hover { color: var(--accent); }
  .kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    padding: 1px 5px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(0, 0, 0, 0.4);
    border-radius: 3px;
    margin-left: 4px;
    color: inherit;
    opacity: 0.7;
  }

  /* ============ RESULT ============ */
  .result { margin-top: 14px; }
  .result-meta {
    display: flex; align-items: center; gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-3);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .result-table-wrap {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    overflow: auto;

        <p>Most programming languages ask you <em>how</em>: how to walk the array, update the counter, run the loop. SQL asks you <em>what</em>: what rows do you want back? The database works out the how.</p>
        <p>This is called <strong>declarative</strong> programming, and it's the first mental shift to make. You don't iterate over rows — you describe a set and the database materializes it. A skilled SQL writer thinks in sets, not in loops.</p>

      <pre class="code"><span class="kw">SELECT</span> * <span class="kw">FROM</span> heroes <span class="kw">WHERE</span> class = <span class="str">'Mage'</span>;</pre>
      <div class="example-caption"><strong>String equality</strong> Single quotes are mandatory for text. Double quotes mean something different — they reference column names.</div>

      <div class="example-caption"><strong>Numeric comparison</strong> No quotes around numbers. Use <code>&gt;=</code> to include the boundary.</div>
      <pre class="code"><span class="kw">SELECT</span> * <span class="kw">FROM</span> heroes <span class="kw">WHERE</span> guild_id <span class="kw">IS NULL</span>;</pre>

  { module: 0, number: '03', title: 'Combining conditions', subtitle: 'AND, OR, NOT, and the importance of parentheses.', content: `
    <div class="section">
      <div class="h3-line">Concept</div>
      <div class="prose">
        <p>A single condition is often not enough. SQL's three boolean operators — <code>AND</code>, <code>OR</code>, <code>NOT</code> — compose richer questions.</p>
        <p>The model is logical: a row passes if the overall expression is true. <code>AND</code> requires both sides true. <code>OR</code> requires at least one true. <code>NOT</code> inverts.</p>
        <p>One source of bugs is precedence. <code>AND</code> binds tighter than <code>OR</code> — so <code>A OR B AND C</code> parses as <code>A OR (B AND C)</code>. When in doubt, parenthesize.</p>
      </div>
    </div>
    <div class="section">
      <div class="h3-line">Examples</div>
      <pre class="code"><span class="kw">SELECT</span> name <span class="kw">FROM</span> heroes
<span class="kw">WHERE</span> class = <span class="str">'Warrior'</span> <span class="kw">AND</span> level &gt;= <span class="num">30</span>;</pre>

<span class="kw">WHERE</span> (class = <span class="str">'Mage'</span> <span class="kw">OR</span> class = <span class="str">'Paladin'</span>)
  <span class="kw">AND</span> level &gt;= <span class="num">25</span>;</pre>
      <div class="example-caption"><strong>Parentheses for clarity</strong> Without them: "any Mage, plus Paladins of level 25+." With them: "Mages or Paladins, of level 25+."</div>
    </div>
    <div class="pitfalls">
      <div class="pitfalls-label">Pitfalls</div>
      <ul>
        <li>Trusting precedence over readability. Even unnecessary parentheses document intent.</li>

      </ul>
    </div>`,

    <div class="section">
      <div class="h3-line">Concept</div>
      <div class="prose">
        <p>A SQL result has no guaranteed order by default. The database returns rows however it finds convenient — and that sequence can change between runs. If you need an order, you must request it.</p>
        <p><code>ORDER BY</code> sorts the result. Default is ascending; add <code>DESC</code> for descending. Sort by multiple columns — first is primary, later ones break ties.</p>
        <p><code>LIMIT</code> caps the row count. Combined with <code>ORDER BY</code>, it's how you ask top-N questions.</p>
      </div>
    </div>
    <div class="section">
      <div class="h3-line">Examples</div>
      <pre class="code"><span class="kw">SELECT</span> name, level <span class="kw">FROM</span> heroes
<span class="kw">ORDER BY</span> level <span class="kw">DESC</span>;</pre>
      <div class="example-caption"><strong>Descending</strong> Highest first. Ties in unspecified order unless you add a secondary key.</div>
      <pre class="code"><span class="kw">SELECT</span> name, class, level <span class="kw">FROM</span> heroes
<span class="kw">ORDER BY</span> class <span class="kw">ASC</span>, level <span class="kw">DESC</span>;</pre>
      <div class="example-caption"><strong>Multi-column</strong> Grouped by class alphabetically; within each class, highest level first.</div>

<span class="kw">ORDER BY</span> xp <span class="kw">DESC</span>
<span class="kw">LIMIT</span> <span class="num">3</span>;</pre>

  { module: 1, number: '05', title: 'DISTINCT and set semantics', subtitle: 'Why SQL keeps duplicates by default.', content: `
    <div class="section">
      <div class="h3-line">Concept</div>
      <div class="prose">
        <p>Query results are <em>multisets</em>, not sets. Duplicates are preserved. If three heroes share a class, asking for "every class" returns that value three times.</p>
        <p>The choice is intentional: deduplication is expensive, and you should opt in. <code>DISTINCT</code> is the opt-in.</p>
        <p>Applied to multiple columns, <code>DISTINCT</code> deduplicates the entire <em>combination</em>. <code>DISTINCT class, guild_id</code> returns each unique pair once.</p>
      </div>
    </div>
    <div class="section">
      <div class="h3-line">Examples</div>
      <pre class="code"><span class="cmt">-- Without DISTINCT: 20 rows</span>
<span class="kw">SELECT</span> class <span class="kw">FROM</span> heroes;

<span class="cmt">-- With DISTINCT: 5 rows</span>
<span class="kw">SELECT DISTINCT</span> class <span class="kw">FROM</span> heroes;</pre>
      <div class="example-caption"><strong>Single column</strong> The classic use.</div>
      <pre class="code"><span class="kw">SELECT DISTINCT</span> class, guild_id <span class="kw">FROM</span> heroes
<span class="kw">ORDER BY</span> class;</pre>
      <div class="example-caption"><strong>Multi-column</strong> Each unique (class, guild_id) pair appears once.</div>
    </div>
    <div class="pitfalls">
      <div class="pitfalls-label">Pitfalls</div>
      <ul>
        <li>Adding <code>DISTINCT</code> reflexively to "clean up" results without understanding the duplicates.</li>
        <li>Expecting <code>DISTINCT</code> to apply to one column when several are selected. It applies to the entire row.</li>

      </ul>

    <div class="section">
      <div class="h3-line">Concept</div>
      <div class="prose">
        <p>Three small operators tighten common <code>WHERE</code> patterns considerably.</p>
        <p><code>LIKE</code> does simple pattern matching: <code>%</code> matches any sequence (including none), <code>_</code> matches exactly one character.</p>
        <p><code>IN</code> tests whether a value appears in a list — sugar for a chain of <code>OR</code> equalities. The list can be a subquery (much more on that later).</p>
        <p><code>BETWEEN x AND y</code> is shorthand for <code>&gt;= x AND &lt;= y</code> — <em>inclusive on both ends</em>.</p>
      </div>
    </div>
    <div class="section">
      <div class="h3-line">Examples</div>
      <pre class="code"><span class="kw">SELECT</span> name <span class="kw">FROM</span> heroes <span class="kw">WHERE</span> name <span class="kw">LIKE</span> <span class="str">'A%'</span>;</pre>

      <pre class="code"><span class="kw">SELECT</span> * <span class="kw">FROM</span> heroes <span class="kw">WHERE</span> class <span class="kw">IN</span> (<span class="str">'Mage'</span>, <span class="str">'Paladin'</span>, <span class="str">'Rogue'</span>);</pre>
      <div class="example-caption"><strong>IN list</strong> Three OR'd equalities, but easier to read.</div>
      <pre class="code"><span class="kw">SELECT</span> * <span class="kw">FROM</span> heroes <span class="kw">WHERE</span> level <span class="kw">BETWEEN</span> <span class="num">20</span> <span class="kw">AND</span> <span class="num">30</span>;</pre>

        <p>A subtle but important rule: aggregates <em>ignore <code>NULL</code></em>. <code>COUNT(column)</code> counts non-null values. <code>AVG(column)</code> averages non-null values. The exception is <code>COUNT(*)</code>, which counts rows regardless.</p>

    <div class="section">
      <div class="h3-line">Concept</div>
      <div class="prose">
        <p>Aggregates over an entire table answer "how many heroes total?" More often you want per-category answers: "how many heroes <em>per class</em>?" That's <code>GROUP BY</code>.</p>
        <p>Mental model: the database collects rows into buckets, one per distinct value of your grouping column. Then runs your aggregates inside each bucket independently. One row per bucket.</p>
        <div class="callout">GROUP BY turns a table of rows into a table of buckets.</div>
        <p>Firm rule: every column in <code>SELECT</code> must either appear in <code>GROUP BY</code> or be wrapped in an aggregate.</p>

    </div>
    <div class="section">
      <div class="h3-line">Examples</div>
      <pre class="code"><span class="kw">SELECT</span> class, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> n
<span class="kw">FROM</span> heroes
<span class="kw">GROUP BY</span> class;</pre>
      <div class="example-caption"><strong>Count per group</strong> One row per class.</div>

<span class="kw">FROM</span> heroes
<span class="kw">GROUP BY</span> class

  { module: 2, number: '09', title: 'HAVING', subtitle: 'Filtering after grouping.', content: `
    <div class="section">
      <div class="h3-line">Concept</div>
      <div class="prose">
        <p><code>WHERE</code> filters individual rows. <code>HAVING</code> filters groups. The distinction matters because aggregates don't exist until after grouping — so they can't appear in <code>WHERE</code>.</p>
        <p>Execution order is fixed: <code>FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY → LIMIT</code>.</p>
        <p>If you use <code>HAVING</code> on a non-aggregate condition, you probably want <code>WHERE</code> instead — it's faster.</p>
      </div>
    </div>
    <div class="section">
      <div class="h3-line">Examples</div>
      <pre class="code"><span class="kw">SELECT</span> class, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> n
<span class="kw">FROM</span> heroes
<span class="kw">GROUP BY</span> class
<span class="kw">HAVING</span> <span class="fn">COUNT</span>(*) &gt;= <span class="num">4</span>;</pre>
      <div class="example-caption"><strong>Filter on an aggregate</strong> Only classes with four or more heroes.</div>
      <pre class="code"><span class="kw">SELECT</span> guild_id, <span class="fn">AVG</span>(level) <span class="kw">AS</span> avg_lvl
<span class="kw">FROM</span> heroes
<span class="kw">WHERE</span> guild_id <span class="kw">IS NOT NULL</span>
<span class="kw">GROUP BY</span> guild_id
<span class="kw">HAVING</span> <span class="fn">AVG</span>(level) &gt; <span class="num">25</span>;</pre>
      <div class="example-caption"><strong>Together</strong> WHERE removes guildless heroes first, then groups form, then HAVING keeps higher-level guilds.</div>
    </div>
    <div class="pitfalls">
      <div class="pitfalls-label">Pitfalls</div>
      <ul>
        <li>Using <code>HAVING</code> when <code>WHERE</code> would do. Slower and signals confusion.</li>
        <li>Some engines allow aliases in <code>HAVING</code>; standard SQL requires repeating the aggregate.</li>
      </ul>
    </div>`,
    challenges: [
      { prompt: "Return each <code>class</code> and its average <code>level</code> (as <code>avg_level</code>), but only classes where avg level exceeds 25.", difficulty: 'medium',
        starter: empty, hint: "GROUP BY class, HAVING AVG(level) > 25.",
        solution: "SELECT class, AVG(level) AS avg_level FROM heroes GROUP BY class HAVING AVG(level) > 25;",
        check: (rows) => rows.every(r => r.avg_level > 25) && rows.length > 0 && rows.length < 5 },
      { prompt: "For each <code>region</code>, return region and quest count (<code>quest_count</code>), only including quests with <code>min_level</code> ≤ 25, and only regions with ≥ 2 such quests.", difficulty: 'hard',
        starter: empty, hint: "WHERE filters quests first. HAVING filters regions after.",
        solution: "SELECT region, COUNT(*) AS quest_count FROM quests WHERE min_level <= 25 GROUP BY region HAVING COUNT(*) >= 2;",
        check: (rows) => rows.every(r => r.quest_count >= 2) && rows.length >= 2 },
      { prompt: "Return each <code>type</code> from <code>items</code> and the total value (<code>total_value</code>), only for types where total_value exceeds 1000.", difficulty: 'medium',
        starter: empty, hint: "SUM(value) per type, HAVING SUM(value) > 1000.",
        solution: "SELECT type, SUM(value) AS total_value FROM items GROUP BY type HAVING SUM(value) > 1000;",
        check: (rows) => rows.every(r => r.total_value > 1000) && rows.length >= 2 }
    ]
  },

  // ============ MODULE 4: JOINS ============
  { module: 3, number: '10', title: 'INNER JOIN', subtitle: 'Stitching two tables together where they match.', content: `
    <div class="section">
      <div class="h3-line">Concept</div>
      <div class="prose">
        <p>In a well-designed database, related information lives in separate tables connected by IDs. Heroes have a <code>guild_id</code>; guild details live in <code>guilds</code>. To answer "what guild does each hero belong to, by name?" you must combine the two — a <em>join</em>.</p>
        <p>Mental model: put two tables side by side, pair every row from the left with every row from the right where the join condition is true. Rows with no match on either side are dropped. That's <em>inner</em> — only the intersection.</p>
        <div class="callout">Inner join: keep the matches, drop the rest.</div>
        <p>Table aliases (<code>heroes h</code>, <code>guilds g</code>) keep complex joins readable, and become necessary when both tables have columns of the same name.</p>
      </div>
    </div>
    <div class="section">
      <div class="h3-line">Examples</div>
      <pre class="code"><span class="kw">SELECT</span> h.name, g.name <span class="kw">AS</span> guild_name
<span class="kw">FROM</span> heroes h
<span class="kw">INNER JOIN</span> guilds g <span class="kw">ON</span> h.guild_id = g.id;</pre>
      <div class="example-caption"><strong>Canonical join</strong> Heroes paired with guilds. Heroes whose guild_id is null are absent.</div>
      <pre class="code"><span class="kw">SELECT</span> h.name, q.name <span class="kw">AS</span> quest, q.reward_gold
<span class="kw">FROM</span> heroes h
<span class="kw">INNER JOIN</span> hero_quests hq <span class="kw">ON</span> h.id = hq.hero_id
<span class="kw">INNER JOIN</span> quests q       <span class="kw">ON</span> hq.quest_id = q.id
<span class="kw">WHERE</span> h.class = <span class="str">'Mage'</span>
<span class="kw">ORDER BY</span> q.reward_gold <span class="kw">DESC</span>;</pre>
      <div class="example-caption"><strong>Three-table join</strong> Walking a many-to-many relationship through a junction table.</div>
    </div>
    <div class="pitfalls">
      <div class="pitfalls-label">Pitfalls</div>
      <ul>
        <li>Omitting <code>ON</code>. The database returns the <em>cartesian product</em> — every row paired with every row.</li>
        <li>Forgetting that inner joins drop unmatched rows on <em>both</em> sides.</li>
        <li>Using comma syntax (<code>FROM a, b WHERE ...</code>). Works, but <code>JOIN … ON</code> separates join logic from filter logic.</li>
      </ul>
    </div>`,
    challenges: [
      { prompt: "Return each hero's <code>name</code> and their guild's <code>name</code> (as <code>guild_name</code>). Exclude guildless heroes.", difficulty: 'medium',
        starter: empty, hint: "INNER JOIN on h.guild_id = g.id.",
        solution: "SELECT h.name, g.name AS guild_name FROM heroes h INNER JOIN guilds g ON h.guild_id = g.id;",
        check: (rows, cols) => cols.includes('name') && cols.includes('guild_name') && rows.length === 17 && rows.every(r => r.guild_name) },
      { prompt: "Return one row per quest completion: hero's <code>name</code>, quest <code>name</code> (as <code>quest_name</code>), and <code>completed_on</code>. Newest first.", difficulty: 'medium',
        starter: empty, hint: "Three tables: heroes → hero_quests → quests.",
        solution: "SELECT h.name, q.name AS quest_name, hq.completed_on FROM heroes h INNER JOIN hero_quests hq ON h.id = hq.hero_id INNER JOIN quests q ON hq.quest_id = q.id ORDER BY hq.completed_on DESC;",
        check: (rows, cols) => cols.includes('name') && cols.includes('quest_name') && cols.includes('completed_on') && rows.length > 50 },
      { prompt: "Return each hero's <code>name</code> alongside the <code>name</code> (as <code>item_name</code>) of every item they own.", difficulty: 'medium',
        starter: empty, hint: "heroes → hero_items → items.",
        solution: "SELECT h.name, i.name AS item_name FROM heroes h INNER JOIN hero_items hi ON h.id = hi.hero_id INNER JOIN items i ON hi.item_id = i.id;",
        check: (rows, cols) => cols.includes('name') && cols.includes('item_name') && rows.length > 40 }
    ]
  },
  { module: 3, number: '11', title: 'LEFT JOIN', subtitle: 'Preserving the unmatched.', content: `
    <div class="section">
      <div class="h3-line">Concept</div>
      <div class="prose">
        <p>Inner joins are symmetric: unmatched rows on either side are dropped. But often you don't want symmetry. "List every hero, alongside their guild <em>if any</em>" requires keeping every hero. That's <code>LEFT JOIN</code>.</p>
        <p>The left table is preserved in full. For each row, the database finds matches in the right table. No matches? The right-side columns come back <code>NULL</code> rather than the row being dropped.</p>
        <p><code>RIGHT JOIN</code> exists as the mirror image but is rare. By convention, put your "kept" table on the left.</p>
      </div>
    </div>
    <div class="section">
      <div class="h3-line">Examples</div>
      <pre class="code"><span class="kw">SELECT</span> h.name, g.name <span class="kw">AS</span> guild_name
<span class="kw">FROM</span> heroes h
<span class="kw">LEFT JOIN</span> guilds g <span class="kw">ON</span> h.guild_id = g.id;</pre>
      <div class="example-caption"><strong>All heroes</strong> Three additional rows vs inner join — one per guildless hero, NULL guild_name.</div>
      <pre class="code"><span class="kw">SELECT</span> g.name <span class="kw">AS</span> guild_name, <span class="fn">COUNT</span>(h.id) <span class="kw">AS</span> hero_count
<span class="kw">FROM</span> guilds g
<span class="kw">LEFT JOIN</span> heroes h <span class="kw">ON</span> g.id = h.guild_id
<span class="kw">GROUP BY</span> g.id;</pre>
      <div class="example-caption"><strong>Counts including zero</strong> Inner join would silently omit empty guilds. LEFT JOIN keeps them; <code>COUNT(h.id)</code> correctly returns 0.</div>
    </div>
    <div class="pitfalls">
      <div class="pitfalls-label">Pitfalls</div>
      <ul>
        <li>Filtering the right-side table in <code>WHERE</code>. Turns your LEFT JOIN back into an inner join. Put the condition in <code>ON</code> instead.</li>
        <li>Using <code>COUNT(*)</code> after a LEFT JOIN when you wanted to count only matches. It counts every row including null-padded ones.</li>
      </ul>
    </div>`,
    challenges: [
      { prompt: "Return every hero's <code>name</code> and guild's <code>name</code> as <code>guild_name</code>. Heroes without a guild should appear with NULL.", difficulty: 'medium',

        solution: "SELECT g.name AS guild_name, COUNT(h.id) AS hero_count FROM guilds g LEFT JOIN heroes h ON g.id = h.guild_id GROUP BY g.id ORDER BY hero_count DESC;",
        check: (rows, cols) => cols.includes('guild_name') && cols.includes('hero_count') && rows.length === 4 },
      { prompt: "Return each item's <code>name</code> and how many heroes own it (<code>owners</code>). Items owned by zero heroes should appear with 0.", difficulty: 'hard',
        starter: empty, hint: "FROM items, LEFT JOIN hero_items, COUNT(hi.hero_id).",
        solution: "SELECT i.name, COUNT(hi.hero_id) AS owners FROM items i LEFT JOIN hero_items hi ON i.id = hi.item_id GROUP BY i.id;",
        check: (rows, cols) => cols.includes('name') && cols.includes('owners') && rows.length === 12 && rows.some(r => r.owners === 0) }
    ]
  },
  { module: 3, number: '12', title: 'Self joins & longer chains', subtitle: 'Joining a table to itself.', content: `
    <div class="section">
      <div class="h3-line">Concept</div>
      <div class="prose">
        <p>A table can be joined to itself. Sounds odd until you notice that some relationships are between rows of the <em>same</em> kind. Our <code>battles</code> table records duels between heroes: attacker and defender, both referenced by <code>heroes.id</code>.</p>
        <p>To produce "Borin defeated Drogath," you join <code>battles</code> to <code>heroes</code> twice — once for attacker, once for defender. Aliases become essential because the table appears under two roles.</p>
        <p>This pattern generalizes to any graph traversal: an employee's manager, a comment's parent.</p>
      </div>
    </div>
    <div class="section">
      <div class="h3-line">Examples</div>
      <pre class="code"><span class="kw">SELECT</span>
  a.name <span class="kw">AS</span> attacker,
  d.name <span class="kw">AS</span> defender,
  w.name <span class="kw">AS</span> winner,
  b.fought_on
<span class="kw">FROM</span> battles b
<span class="kw">INNER JOIN</span> heroes a <span class="kw">ON</span> b.attacker_id = a.id
<span class="kw">INNER JOIN</span> heroes d <span class="kw">ON</span> b.defender_id = d.id
<span class="kw">LEFT JOIN</span>  heroes w <span class="kw">ON</span> b.winner_id   = w.id;</pre>
      <div class="example-caption"><strong>Three roles, one table</strong> Heroes aliased as a, d, w. Winner is LEFT JOIN because draws have NULL winner_id.</div>
    </div>
    <div class="pitfalls">
      <div class="pitfalls-label">Pitfalls</div>
      <ul>
        <li>Forgetting aliases on a self-join. The database can't tell which copy of the column you mean.</li>
        <li>Joining without considering row multiplication. 5 quests × 3 items per hero = 15 rows.</li>
      </ul>
    </div>`,

  // ============ MODULE 5: ADVANCED ============
  { module: 4, number: '13', title: 'Subqueries', subtitle: 'A query whose result becomes part of another query.', content: `
    <div class="section">
      <div class="h3-line">Concept</div>
      <div class="prose">
        <p>A <em>subquery</em> is a query nested inside another query — usually in <code>WHERE</code>, sometimes <code>FROM</code> or <code>SELECT</code>. The inner query runs first, produces a result, and the outer query uses it as if it were a literal.</p>
        <p>Three flavors. <strong>Scalar subquery</strong> returns one value for comparison: <code>WHERE level &gt; (SELECT AVG(level) FROM heroes)</code>. <strong>List subquery</strong> returns one column, paired with <code>IN</code>/<code>NOT IN</code>. <strong>Table subquery</strong> returns a full result treated as a derived table in <code>FROM</code>.</p>
        <p>Powerful, but can become hard to read — which is why CTEs (next lesson) often supplant them.</p>
      </div>
    </div>
    <div class="section">
      <div class="h3-line">Examples</div>
      <pre class="code"><span class="cmt">-- Scalar subquery</span>
<span class="kw">SELECT</span> name, level
<span class="kw">FROM</span> heroes
<span class="kw">WHERE</span> level &gt; (<span class="kw">SELECT</span> <span class="fn">AVG</span>(level) <span class="kw">FROM</span> heroes);</pre>
      <div class="example-caption"><strong>Above average</strong> Inner computes the average; outer compares each row to it.</div>
      <pre class="code"><span class="cmt">-- List subquery</span>
<span class="kw">SELECT</span> name
<span class="kw">FROM</span> heroes
<span class="kw">WHERE</span> id <span class="kw">IN</span> (
  <span class="kw">SELECT</span> winner_id <span class="kw">FROM</span> battles <span class="kw">WHERE</span> winner_id <span class="kw">IS NOT NULL</span>
);</pre>
      <div class="example-caption"><strong>Has ever won</strong> Inner produces a list; outer keeps matching heroes.</div>
    </div>
    <div class="pitfalls">
      <div class="pitfalls-label">Pitfalls</div>
      <ul>
        <li><code>NOT IN</code> with a list containing <code>NULL</code> returns no rows. One of SQL's nastiest surprises.</li>
        <li>Scalar subqueries returning more than one row error at runtime.</li>
        <li>Deeply nested subqueries are hard to read. Beyond two levels, restructure with CTEs.</li>
      </ul>
    </div>`,

      { prompt: "Return the names of items whose <code>value</code> is greater than the average value of all items.", difficulty: 'medium',
        starter: empty, hint: "Scalar subquery for AVG(value).",
        solution: "SELECT name FROM items WHERE value > (SELECT AVG(value) FROM items);",
        check: (rows, cols) => cols.length === 1 && cols[0] === 'name' && rows.length >= 2 }
    ]
  },
  { module: 4, number: '14', title: 'Common Table Expressions', subtitle: 'Naming your thoughts with WITH.', content: `
    <div class="section">
      <div class="h3-line">Concept</div>
      <div class="prose">
        <p>A <strong>Common Table Expression</strong> (CTE) is a named subquery defined with <code>WITH</code> at the top of a query. It behaves like a temporary table for the duration of the surrounding query.</p>
        <p>CTEs aren't more powerful than subqueries — but they are dramatically more <em>readable</em>. A query with CTEs reads top to bottom: "first compute X, then Y, then answer the real question." Subqueries read inside-out.</p>
        <div class="callout">A CTE turns an inside-out subquery into a top-down narrative.</div>
        <p>Chain multiple CTEs with commas; later CTEs can reference earlier ones. Standard way to express non-trivial analytical queries.</p>
      </div>
    </div>
    <div class="section">
      <div class="h3-line">Examples</div>
      <pre class="code"><span class="kw">WITH</span> class_stats <span class="kw">AS</span> (
  <span class="kw">SELECT</span> class, <span class="fn">AVG</span>(level) <span class="kw">AS</span> avg_lvl
  <span class="kw">FROM</span> heroes
  <span class="kw">GROUP BY</span> class
)
<span class="kw">SELECT</span> * <span class="kw">FROM</span> class_stats
<span class="kw">WHERE</span> avg_lvl &gt; <span class="num">25</span>;</pre>
      <div class="example-caption"><strong>Single CTE</strong> Compute per-class averages, then filter.</div>
    </div>
    <div class="pitfalls">
      <div class="pitfalls-label">Pitfalls</div>
      <ul>
        <li>Treating CTEs as performance optimization. Some engines materialize them; others inline. Use for clarity first.</li>
        <li>Missing the comma between multiple CTEs.</li>
      </ul>
    </div>`,
    challenges: [
      { prompt: "Using a CTE called <code>quest_counts</code> that computes quests completed per hero, return the <code>name</code> and count (as <code>quests_done</code>) of heroes who've completed more than 3 quests.", difficulty: 'hard',
        starter: empty, hint: "CTE: GROUP BY hero_id, COUNT(*). Then JOIN heroes and filter > 3.",
        solution: "WITH quest_counts AS (SELECT hero_id, COUNT(*) AS quests_done FROM hero_quests GROUP BY hero_id) SELECT h.name, qc.quests_done FROM heroes h INNER JOIN quest_counts qc ON h.id = qc.hero_id WHERE qc.quests_done > 3;",

        starter: empty, hint: "Two CTEs separated by a comma; join both onto heroes.",
        solution: "WITH class_avg AS (SELECT class, AVG(level) AS class_avg FROM heroes GROUP BY class), guild_size AS (SELECT guild_id, COUNT(*) AS guild_size FROM heroes WHERE guild_id IS NOT NULL GROUP BY guild_id) SELECT h.name, h.class, ca.class_avg, gs.guild_size FROM heroes h INNER JOIN class_avg ca ON h.class = ca.class INNER JOIN guild_size gs ON h.guild_id = gs.guild_id;",
        check: (rows, cols) => cols.includes('name') && cols.includes('class') && cols.includes('class_avg') && cols.includes('guild_size') && rows.length === 17 }
    ]
  },
  { module: 4, number: '15', title: 'Window functions', subtitle: 'Computing across rows without collapsing them.', content: `
    <div class="section">
      <div class="h3-line">Concept</div>
      <div class="prose">
        <p><code>GROUP BY</code> collapses rows. If you want per-class averages alongside the raw rows — keeping all 20 heroes visible but showing their class average next to each — <code>GROUP BY</code> can't help. <strong>Window functions</strong> can.</p>
        <p>A window function computes a value across a "window" of related rows for each input row, without collapsing. The query keeps its row count; you just gain columns.</p>
        <p>The window is defined by <code>OVER</code>. <code>PARTITION BY</code> divides rows into groups (like <code>GROUP BY</code>, but non-collapsing). <code>ORDER BY</code> within <code>OVER</code> imposes an order, important for ranking and running totals.</p>
        <div class="callout">Window functions are the biggest leap from "writing SQL" to "thinking in SQL."</div>
        <p>Common ones: <code>ROW_NUMBER()</code>, <code>RANK()</code>, <code>DENSE_RANK()</code>, <code>LAG()</code>, <code>LEAD()</code>. Aggregates also work as windows.</p>
      </div>
    </div>
    <div class="section">
      <div class="h3-line">Examples</div>
      <pre class="code"><span class="kw">SELECT</span> name, class, xp,
       <span class="fn">RANK</span>() <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> class <span class="kw">ORDER BY</span> xp <span class="kw">DESC</span>) <span class="kw">AS</span> class_rank
<span class="kw">FROM</span> heroes;</pre>
      <div class="example-caption"><strong>Ranking within groups</strong> Every hero returned with their rank within their class.</div>
      <pre class="code"><span class="kw">SELECT</span> name, xp,

const STORAGE_KEY = 'queryschool-v5';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      completed = new Set(d.completed || []);
      solvedChallenges = new Set(d.solvedChallenges || []);
      solvedPractice = new Set(d.solvedPractice || []);
      savedEditors = d.savedEditors || {};
      savedPracticeEditors = d.savedPracticeEditors || {};
      sandboxQuery = d.sandboxQuery || sandboxQuery;
    }
  } catch(e) {}
}
function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completed: [...completed], solvedChallenges: [...solvedChallenges],
      solvedPractice: [...solvedPractice],
      savedEditors, savedPracticeEditors, sandboxQuery
    }));
  } catch(e) {}
}

async function init() {
  const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
  db = new SQL.Database();
  db.exec(SCHEMA_SQL);
  loadProgress();
  render();
}

function updateProgressPill() {
  const pill = document.getElementById('progress-pill');
  if (mode === 'home') { pill.style.display = 'none'; return; }
  pill.style.display = 'flex';
  document.getElementById('progress-text').textContent = `${completed.size}/${lessons.length}`;
  document.getElementById('progress-fill').style.width = `${100 * completed.size / lessons.length}%`;
}

function setMode(m, idx) {
  mode = m;
  if (idx !== undefined) currentLesson = idx;
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  if (m === 'home' || m === 'lesson') document.getElementById('tab-home').classList.add('active');
  else document.getElementById('tab-' + m).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function render() {
  updateProgressPill();
  const app = document.getElementById('app');
  app.className = '';
  if (mode === 'home') renderHome(app);
  else if (mode === 'lesson') renderLesson(app);
  else if (mode === 'practice') renderPractice(app);
  else if (mode === 'sandbox') renderSandbox(app);
  else if (mode === 'schema') renderSchema(app);
}

        <div class="stat"><div class="stat-num"><span class="accent">7</span></div><div class="stat-label">Tables to query</div></div>

// =====================================================================
// LESSON
// =====================================================================
function renderLesson(app) {
  const lesson = lessons[currentLesson];
  const module = MODULES[lesson.module];

  let tocHtml = '';
  MODULES.forEach((m, mi) => {
    const moduleLessons = lessons.map((l, i) => ({l, i})).filter(x => x.l.module === mi);
    tocHtml += `<div class="toc-module">
      <div class="toc-module-name">${m.num} · ${m.name}</div>
      ${moduleLessons.map(({l, i}) => `
        <div class="toc-lesson ${i === currentLesson ? 'active' : ''} ${completed.has(i) ? 'done' : ''}" onclick="setMode('lesson', ${i})">
          <span class="toc-lesson-num">${l.number}</span>
          <span style="flex:1;">${l.title}</span>
          <span class="toc-check">✓</span>
        </div>`).join('')}
    </div>`;
  });

  const challengesHtml = lesson.challenges.map((ch, ci) => {
    const key = `${currentLesson}-${ci}`;
    const solvedKey = `L${currentLesson}-C${ci}`;
    const isSolved = solvedChallenges.has(solvedKey);
    const savedCode = savedEditors[key] !== undefined ? savedEditors[key] : ch.starter;
    return `
      <div class="challenge ${isSolved ? 'solved' : ''}" id="challenge-${ci}">
        <div class="challenge-header">
          <div class="challenge-title-wrap">
            <span class="challenge-num">${isSolved ? '✓' : String(ci + 1).padStart(2, '0')}</span>
            <span>Challenge</span>
          </div>
          <span class="difficulty ${ch.difficulty}">${ch.difficulty}</span>
        </div>
        <div class="challenge-body">
          <div class="challenge-prompt">${ch.prompt}</div>
          <textarea class="editor" id="editor-${ci}" spellcheck="false" oninput="onEditorInput(${ci})" placeholder="-- Write your query">${escapeHtml(savedCode)}</textarea>
          <div class="actions">
            <button class="btn" onclick="runChallenge(${ci})">Run query</button>
            <button class="btn btn-ghost" onclick="resetChallenge(${ci})">Reset</button>
            <div style="flex:1;"></div>
            <button class="btn btn-link" onclick="toggleHint(${ci})">Hint</button>
            <button class="btn btn-link" onclick="toggleSolution(${ci})">Solution</button>
          </div>
          <div id="hint-${ci}"></div>
          <div id="solution-${ci}"></div>
          <div id="output-${ci}"></div>
        </div>
      </div>
    `;
  }).join('');

  const prev = currentLesson > 0 ? currentLesson - 1 : null;
  const next = currentLesson < lessons.length - 1 ? currentLesson + 1 : null;

  app.innerHTML = `
    <div class="grid">
      <aside class="toc">${tocHtml}</aside>
      <main>
        <div class="lesson-head">
          <div class="breadcrumb">
            <span class="accent">module ${module.num}</span>
            <span class="sep">/</span>
            <span>${module.name.toLowerCase()}</span>
            <span class="sep">/</span>
            <span>lesson ${lesson.number}</span>
          </div>
          <h1 class="lesson-title">${lesson.title}</h1>
          <p class="lesson-subtitle">${lesson.subtitle}</p>
        </div>
        ${lesson.content}
        <div class="section">
          <div class="h3-line">Practice · ${lesson.challenges.length} challenge${lesson.challenges.length === 1 ? '' : 's'}</div>
          ${challengesHtml}
        </div>
        <div class="lesson-nav">
          ${prev !== null ? `<button class="nav-link" onclick="setMode('lesson', ${prev})">
            <div class="nav-link-eyebrow">← previous</div>
            <div class="nav-link-title">${lessons[prev].title}</div>
          </button>` : '<div style="flex:1"></div>'}
          ${next !== null ? `<button class="nav-link next" onclick="setMode('lesson', ${next})">
            <div class="nav-link-eyebrow">next →</div>
            <div class="nav-link-title">${lessons[next].title}</div>
          </button>` : `<button class="nav-link next" onclick="setMode('practice')">
            <div class="nav-link-eyebrow">next →</div>
            <div class="nav-link-title">Practice bank</div>
          </button>`}
        </div>
      </main>
    </div>
  `;
}

function onEditorInput(ci) {
  const key = `${currentLesson}-${ci}`;
  savedEditors[key] = document.getElementById(`editor-${ci}`).value;
  saveProgress();
}
function resetChallenge(ci) {
  const key = `${currentLesson}-${ci}`;
  delete savedEditors[key];
  saveProgress();
  document.getElementById(`editor-${ci}`).value = lessons[currentLesson].challenges[ci].starter;
  document.getElementById(`output-${ci}`).innerHTML = '';
}
function toggleHint(ci) {
  const box = document.getElementById(`hint-${ci}`);
  if (box.innerHTML) { box.innerHTML = ''; return; }
  const ch = lessons[currentLesson].challenges[ci];
  box.innerHTML = `<div class="reveal"><div class="reveal-label">Hint</div>${ch.hint}</div>`;
}
function toggleSolution(ci) {
  const box = document.getElementById(`solution-${ci}`);
  if (box.innerHTML) { box.innerHTML = ''; return; }
  const ch = lessons[currentLesson].challenges[ci];
  box.innerHTML = `<div class="reveal"><div class="reveal-label">Reference solution</div><pre class="code">${highlightSql(ch.solution)}</pre></div>`;
}
function runChallenge(ci) {
  const sql = document.getElementById(`editor-${ci}`).value;
  const output = document.getElementById(`output-${ci}`);
  runInto(sql, output, lessons[currentLesson].challenges[ci].check, () => {
    const solvedKey = `L${currentLesson}-C${ci}`;
    solvedChallenges.add(solvedKey);
    // a lesson is "completed" once every challenge is solved
    const allSolved = lessons[currentLesson].challenges.every((_, idx) => solvedChallenges.has(`L${currentLesson}-C${idx}`));
    if (allSolved) {
      completed.add(currentLesson);
      document.querySelectorAll('.toc-lesson').forEach((el, idx) => { if (idx === currentLesson) el.classList.add('done'); });
      updateProgressPill();
    }
    document.getElementById(`challenge-${ci}`).classList.add('solved');
    document.querySelector(`#challenge-${ci} .challenge-num`).textContent = '✓';
    saveProgress();
  });
}

// =====================================================================
// PRACTICE BANK
// =====================================================================
function renderPractice(app) {
  const filters = [
    { id: 'all', label: 'All' },
    { id: 'easy', label: 'Easy' },
    { id: 'medium', label: 'Medium' },
    { id: 'hard', label: 'Hard' },
    { id: 'expert', label: 'Expert' },
  ];
  const filtersHtml = filters.map(f => {
    const count = f.id === 'all' ? practiceBank.length : practiceBank.filter(q => q.difficulty === f.id).length;
    return `<div class="filter-chip ${practiceFilter === f.id ? 'active' : ''}" onclick="setPracticeFilter('${f.id}')">${f.label} <span style="opacity:.6;margin-left:4px;">${count}</span></div>`;
  }).join('');

  const filtered = practiceFilter === 'all' ? practiceBank : practiceBank.filter(q => q.difficulty === practiceFilter);

  // Group by tier
  let html = '';
  let currentTier = null;
  filtered.forEach((q, i) => {
    const realIdx = practiceBank.indexOf(q);
    if (q.tier !== currentTier) {
      currentTier = q.tier;
      const tierLabels = { 1: 'Tier 1 · Foundations', 2: 'Tier 2 · Sets & Aggregation', 3: 'Tier 3 · Joins', 4: 'Tier 4 · Advanced' };
      html += `<div class="tier-divider"><span class="tier-label">${tierLabels[q.tier]}</span><div class="tier-line"></div></div>`;
    }
    const savedCode = savedPracticeEditors[realIdx] !== undefined ? savedPracticeEditors[realIdx] : '-- Write your query\n';
    const isSolved = solvedPractice.has(realIdx);
    const lessonRef = lessons[q.lesson];
    html += `
      <div class="challenge ${isSolved ? 'solved' : ''}" id="prac-card-${realIdx}">
        <div class="challenge-header">
          <div class="challenge-title-wrap">
            <span class="challenge-num">${isSolved ? '✓' : `Q${String(realIdx + 1).padStart(2, '0')}`}</span>
          </div>
          <div style="display:flex; gap: 8px; align-items: center; flex-wrap: wrap;">
            <span class="lesson-ref" onclick="setMode('lesson', ${q.lesson})" title="Open the lesson">${lessonRef.number} · ${lessonRef.title}</span>
            <span class="difficulty ${q.difficulty}">${q.difficulty}</span>
          </div>
        </div>
        <div class="challenge-body">
          <div class="challenge-prompt">${q.prompt}</div>
          <textarea class="editor" id="prac-editor-${realIdx}" spellcheck="false" oninput="onPracticeInput(${realIdx})" placeholder="-- Write your query">${escapeHtml(savedCode)}</textarea>
          <div class="actions">
            <button class="btn" onclick="runPractice(${realIdx})">Run query</button>
            <button class="btn btn-ghost" onclick="resetPractice(${realIdx})">Reset</button>
            <div style="flex:1;"></div>
            <button class="btn btn-link" onclick="togglePracticeSolution(${realIdx})">Solution</button>
          </div>
          <div id="prac-solution-${realIdx}"></div>
          <div id="prac-output-${realIdx}"></div>
        </div>
      </div>
    `;
  });

  app.innerHTML = `
    <div class="practice-head">
      <div class="lesson-head">
        <div class="breadcrumb"><span class="accent">/ practice bank</span></div>
        <h1 class="lesson-title">Question bank</h1>
        <p class="lesson-subtitle">${practiceBank.length} questions of escalating difficulty, organized in four tiers. Each shows the lesson that covers the relevant material — click the tag to jump there.</p>
      </div>
      <div class="practice-filters">${filtersHtml}</div>
      <div class="practice-meta">${solvedPractice.size} of ${practiceBank.length} solved · showing ${filtered.length}</div>
      ${html}
    </div>
  `;
}

function setPracticeFilter(f) { practiceFilter = f; render(); }
function onPracticeInput(idx) { savedPracticeEditors[idx] = document.getElementById(`prac-editor-${idx}`).value; saveProgress(); }
function resetPractice(idx) {
  delete savedPracticeEditors[idx]; saveProgress();
  document.getElementById(`prac-editor-${idx}`).value = '-- Write your query\n';
  document.getElementById(`prac-output-${idx}`).innerHTML = '';
}
function togglePracticeSolution(idx) {
  const box = document.getElementById(`prac-solution-${idx}`);
  if (box.innerHTML) { box.innerHTML = ''; return; }
  box.innerHTML = `<div class="reveal"><div class="reveal-label">Reference solution</div><pre class="code">${highlightSql(practiceBank[idx].solution)}</pre></div>`;
}
function runPractice(idx) {
  const sql = document.getElementById(`prac-editor-${idx}`).value;
  const output = document.getElementById(`prac-output-${idx}`);
  runInto(sql, output, practiceBank[idx].check, () => {
    solvedPractice.add(idx);
    document.getElementById(`prac-card-${idx}`).classList.add('solved');
    document.querySelector(`#prac-card-${idx} .challenge-num`).textContent = '✓';
    saveProgress();
  });
}

// =====================================================================
// SANDBOX
// =====================================================================
function renderSandbox(app) {
  app.innerHTML = `
    <div style="max-width: 980px; margin: 0 auto;">
      <div class="lesson-head">
        <div class="breadcrumb"><span class="accent">/ sandbox</span></div>
        <h1 class="lesson-title">Workshop</h1>
        <p class="lesson-subtitle">Free-form queries. Nothing is checked; explore freely. Tables available: <code style="font-family:'JetBrains Mono',monospace;color:var(--accent);background:var(--bg-1);border:1px solid var(--border);padding:1px 5px;border-radius:3px;">heroes</code>, <code style="font-family:'JetBrains Mono',monospace;color:var(--accent);background:var(--bg-1);border:1px solid var(--border);padding:1px 5px;border-radius:3px;">guilds</code>, <code style="font-family:'JetBrains Mono',monospace;color:var(--accent);background:var(--bg-1);border:1px solid var(--border);padding:1px 5px;border-radius:3px;">quests</code>, <code style="font-family:'JetBrains Mono',monospace;color:var(--accent);background:var(--bg-1);border:1px solid var(--border);padding:1px 5px;border-radius:3px;">hero_quests</code>, <code style="font-family:'JetBrains Mono',monospace;color:var(--accent);background:var(--bg-1);border:1px solid var(--border);padding:1px 5px;border-radius:3px;">items</code>, <code style="font-family:'JetBrains Mono',monospace;color:var(--accent);background:var(--bg-1);border:1px solid var(--border);padding:1px 5px;border-radius:3px;">hero_items</code>, <code style="font-family:'JetBrains Mono',monospace;color:var(--accent);background:var(--bg-1);border:1px solid var(--border);padding:1px 5px;border-radius:3px;">battles</code>.</p>
      </div>
      <textarea class="editor" id="sandbox-editor" spellcheck="false" style="min-height: 220px;" oninput="onSandboxInput()">${escapeHtml(sandboxQuery)}</textarea>
      <div class="actions">
        <button class="btn" onclick="runSandbox()">Run query</button>
        <button class="btn btn-ghost" onclick="resetDatabase()">Reset database</button>
      </div>
      <div id="sandbox-output"></div>
    </div>
  `;
}
function onSandboxInput() { sandboxQuery = document.getElementById('sandbox-editor').value; saveProgress(); }
function runSandbox() {
  const sql = document.getElementById('sandbox-editor').value;
  const output = document.getElementById('sandbox-output');
  try {
    const results = db.exec(sql);
    if (results.length === 0) {
      output.innerHTML = `<div class="result"><div class="result-meta">query ran · no rows returned</div></div>`;
      return;
    }
    output.innerHTML = results.map(r => renderResultTable(r.columns, r.values)).join('');
  } catch (e) {
    output.innerHTML = `<div class="result"><div class="result-error"><span class="label">error</span>${escapeHtml(e.message)}</div></div>`;
  }
}
async function resetDatabase() {
  const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
  db = new SQL.Database();
  db.exec(SCHEMA_SQL);
  document.getElementById('sandbox-output').innerHTML = `<div class="result"><div class="result-meta">database reset to initial state</div></div>`;
}

// =====================================================================
// SCHEMA
// =====================================================================
function renderSchema(app) {
  const tableNames = ['heroes', 'guilds', 'quests', 'hero_quests', 'items', 'hero_items', 'battles'];
  const cardsHtml = tableNames.map(t => {
    const info = db.exec(`PRAGMA table_info(${t});`)[0];
    const count = db.exec(`SELECT COUNT(*) FROM ${t};`)[0].values[0][0];
    const cols = info.values.map(r => `
      <div class="schema-col">
        <span class="schema-col-name">${r[1]}${r[5] ? '<span class="schema-col-pk">pk</span>' : ''}</span>
        <span class="schema-col-type">${r[2].toLowerCase()}</span>
      </div>`).join('');
    return `<div class="schema-card">
      <div class="schema-card-head">
        <span class="schema-card-name">${t}</span>
        <span class="schema-card-rows">${count} rows</span>
      </div>
      ${cols}
    </div>`;
  }).join('');

  app.innerHTML = `
    <div style="max-width: 1100px; margin: 0 auto;">
      <div class="lesson-head">
        <div class="breadcrumb"><span class="accent">/ schema</span></div>
        <h1 class="lesson-title">Database</h1>
        <p class="lesson-subtitle">A small fantasy-guild ledger. Used throughout the course.</p>
      </div>
      <div class="schema-grid">${cardsHtml}</div>
      <div class="schema-relationships">
        <div class="h3-line" style="margin-bottom: 14px;">Foreign keys</div>
        <div class="rel">heroes.guild_id<span class="arrow">→</span>guilds.id</div>
        <div class="rel">hero_quests.hero_id<span class="arrow">→</span>heroes.id</div>
        <div class="rel">hero_quests.quest_id<span class="arrow">→</span>quests.id</div>
        <div class="rel">hero_items.hero_id<span class="arrow">→</span>heroes.id</div>
        <div class="rel">hero_items.item_id<span class="arrow">→</span>items.id</div>
        <div class="rel">battles.attacker_id, defender_id, winner_id<span class="arrow">→</span>heroes.id</div>
      </div>
    </div>
  `;
}

// =====================================================================
// SHARED
// =====================================================================
function runInto(sql, outputEl, checkFn, onSuccess) {
  try {
    const results = db.exec(sql);
    if (results.length === 0) {
      outputEl.innerHTML = `<div class="result"><div class="result-meta">query ran · no rows returned</div></div>`;
      return;
    }
    const { columns, values } = results[0];
    const rows = values.map(row => Object.fromEntries(columns.map((c, i) => [c, row[i]])));
    let html = renderResultTable(columns, values);
    let ok = false;
    try { ok = checkFn(rows, columns); } catch(e) { ok = false; }
    if (ok) {
      if (onSuccess) onSuccess();
      html += `<div class="feedback correct"><span class="feedback-icon">✓</span><span>Correct. Your result matches what was expected.</span></div>`;
    } else {
      html += `<div class="feedback incorrect"><span class="feedback-icon">!</span><span>The query ran, but the result doesn't match. Try again.</span></div>`;
    }
    outputEl.innerHTML = html;
  } catch (e) {
    outputEl.innerHTML = `<div class="result"><div class="result-error"><span class="label">error</span>${escapeHtml(e.message)}</div></div>`;
  }
}

function renderResultTable(columns, values) {
  return `<div class="result">
    <div class="result-meta">${values.length} row${values.length === 1 ? '' : 's'} · ${columns.length} column${columns.length === 1 ? '' : 's'}</div>
    <div class="result-table-wrap"><table class="results">
      <thead><tr>${columns.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr></thead>
      <tbody>${values.map(r => '<tr>' + r.map(v =>
        v === null ? '<td class="null">NULL</td>' : `<td>${escapeHtml(String(v))}</td>`
      ).join('') + '</tr>').join('')}</tbody>
    </table></div>
  </div>`;
}

function highlightSql(sql) {
  const keywords = /\b(SELECT|FROM|WHERE|AND|OR|NOT|IN|LIKE|BETWEEN|IS|NULL|GROUP BY|HAVING|ORDER BY|LIMIT|JOIN|INNER|LEFT|RIGHT|OUTER|ON|AS|DISTINCT|WITH|UNION|ALL|ASC|DESC|PARTITION BY|OVER|CASE|WHEN|THEN|ELSE|END)\b/gi;
  const funcs = /\b(COUNT|SUM|AVG|MIN|MAX|RANK|ROW_NUMBER|DENSE_RANK|LAG|LEAD|COALESCE|NULLIF)\b/gi;
  return escapeHtml(sql)
    .replace(/--[^\n]*/g, m => `<span class="cmt">${m}</span>`)
    .replace(/'([^']*)'/g, (m, s) => `<span class="str">'${s}'</span>`)
    .replace(/\b(\d+)\b/g, '<span class="num">$1</span>')
    .replace(funcs, '<span class="fn">$1</span>')
    .replace(keywords, '<span class="kw">$1</span>');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
