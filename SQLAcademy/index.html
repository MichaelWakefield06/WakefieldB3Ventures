<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The SQL Atelier — A Course in the Craft of Querying</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<style>
  :root {
    --slate-900: #14201F;
    --slate-800: #1B2A2E;
    --slate-700: #243639;
    --slate-600: #2E4549;
    --slate-500: #3D5559;
    --cream-100: #F2EBD8;
    --cream-200: #E8E1D1;
    --cream-300: #D4CCB8;
    --cream-400: #B8B0A0;
    --cream-500: #8A8273;
    --brass: #C9A86A;
    --brass-dim: #9F8552;
    --brass-bright: #E2C285;
    --oxblood: #B5454D;
    --moss: #6F9072;
    --hairline: rgba(232, 225, 209, 0.12);
    --hairline-strong: rgba(232, 225, 209, 0.22);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Newsreader', Georgia, serif;
    font-optical-sizing: auto;
    font-size: 17px;
    line-height: 1.65;
    background: var(--slate-800);
    color: var(--cream-200);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .serif-display { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; }
  .sans { font-family: 'Inter', system-ui, sans-serif; }
  .mono { font-family: 'JetBrains Mono', 'SF Mono', Monaco, monospace; }
  .label {
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 11px;
    font-weight: 600;
    color: var(--brass);
  }
  /* ============ LAYOUT ============ */
  .masthead {
    border-bottom: 1px solid var(--hairline-strong);
    background: var(--slate-900);
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(8px);
  }
  .masthead-inner {
    max-width: 1240px;
    margin: 0 auto;
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
  }
  .brand {
    display: flex; align-items: baseline; gap: 12px;
  }
  .brand .mark {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 26px;
    color: var(--cream-100);
    letter-spacing: -0.01em;
  }
  .brand .mark .amp { color: var(--brass); }
  .brand .tagline {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--cream-500);
  }
  .tabs {
    display: flex; gap: 0;
    border: 1px solid var(--hairline-strong);
    border-radius: 2px;
  }
  .tabs button {
    background: transparent;
    color: var(--cream-400);
    border: none;
    padding: 8px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-right: 1px solid var(--hairline-strong);
    transition: all 0.15s;
  }
  .tabs button:last-child { border-right: none; }
  .tabs button:hover { color: var(--cream-100); background: var(--slate-700); }
  .tabs button.active { color: var(--slate-900); background: var(--brass); }
  .progress-meter {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--cream-400);
  }
  .meter-bar {
    width: 80px; height: 3px; background: var(--slate-600); position: relative; overflow: hidden;
  }
  .meter-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--brass); transition: width 0.4s; }

  .container {
    max-width: 1240px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }
  .grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 56px;
  }
  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; gap: 32px; }
    .masthead-inner { padding: 12px 18px; flex-wrap: wrap; }
    .container { padding: 24px 18px 60px; }
  }

  /* ============ TOC SIDEBAR ============ */
  .toc { position: sticky; top: 80px; align-self: start; max-height: calc(100vh - 100px); overflow-y: auto; padding-right: 8px; }
  .toc::-webkit-scrollbar { width: 4px; }
  .toc::-webkit-scrollbar-thumb { background: var(--slate-600); }
  .toc-module { margin-bottom: 24px; }
  .toc-module-header {
    display: flex; align-items: baseline; gap: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--hairline);
    margin-bottom: 8px;
  }
  .toc-module-num {
    font-family: 'Instrument Serif', serif; font-style: italic;
    color: var(--brass); font-size: 18px;
  }
  .toc-module-name {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--cream-500);
    font-weight: 600;
  }
  .toc-lesson {
    display: flex; align-items: baseline; gap: 10px;
    padding: 7px 0 7px 4px;
    cursor: pointer;
    font-size: 14px;
    color: var(--cream-300);
    border-left: 2px solid transparent;
    padding-left: 12px;
    transition: all 0.15s;
    font-family: 'Newsreader', serif;
  }
  .toc-lesson:hover { color: var(--cream-100); border-left-color: var(--brass-dim); }
  .toc-lesson.active { color: var(--cream-100); border-left-color: var(--brass); }
  .toc-lesson.done { color: var(--cream-400); }
  .toc-lesson.done .toc-check { color: var(--moss); }
  .toc-lesson-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--cream-500); width: 24px; flex-shrink: 0; }
  .toc-check { font-family: 'Inter', sans-serif; font-size: 12px; opacity: 0; transition: opacity 0.2s; margin-left: auto; }
  .toc-lesson.done .toc-check { opacity: 1; }

  /* ============ LESSON ============ */
  .lesson-header {
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--hairline);
  }
  .lesson-eyebrow {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .lesson-eyebrow .divider {
    flex: 1; height: 1px; background: var(--hairline-strong); max-width: 60px;
  }
  .lesson-number {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 80px;
    line-height: 0.9;
    color: var(--brass);
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .lesson-title {
    font-family: 'Instrument Serif', serif;
    font-size: 44px;
    line-height: 1.1;
    color: var(--cream-100);
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .lesson-subtitle {
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--cream-400);
    margin-top: 8px;
  }
  @media (max-width: 600px) {
    .lesson-number { font-size: 56px; }
    .lesson-title { font-size: 32px; }
  }

  .section { margin-bottom: 40px; }
  .section h3 {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--brass);
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--hairline);
  }
  .prose p { margin-bottom: 16px; max-width: 70ch; }
  .prose p:last-child { margin-bottom: 0; }
  .prose code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    background: var(--slate-900);
    color: var(--brass-bright);
    padding: 2px 6px;
    border-radius: 2px;
  }
  .prose ul, .prose ol { margin: 0 0 16px 24px; max-width: 70ch; }
  .prose li { margin-bottom: 6px; }
  .prose strong { color: var(--cream-100); font-weight: 600; }
  .prose em { font-style: italic; color: var(--cream-100); }
  .prose a { color: var(--brass); }

  .pull-quote {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 22px;
    line-height: 1.4;
    color: var(--cream-100);
    border-left: 2px solid var(--brass);
    padding: 4px 0 4px 20px;
    margin: 24px 0;
    max-width: 60ch;
  }

  /* ============ CODE BLOCKS ============ */
  pre.code {
    background: var(--slate-900);
    border: 1px solid var(--hairline);
    border-left: 2px solid var(--brass-dim);
    padding: 16px 18px;
    margin: 14px 0 20px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: var(--cream-200);
    border-radius: 2px;
  }
  pre.code .kw { color: var(--brass-bright); font-weight: 500; }
  pre.code .str { color: #C9D6A8; }
  pre.code .num { color: #E2C285; }
  pre.code .cmt { color: var(--cream-500); font-style: italic; }
  pre.code .fn { color: #D8A8C9; }

  .example-caption {
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--cream-400);
    margin-top: -12px;
    margin-bottom: 24px;
    padding-left: 12px;
    border-left: 1px solid var(--hairline);
  }
  .example-caption strong { font-style: normal; color: var(--brass); font-family: 'Inter', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; margin-right: 8px; }

  /* ============ PITFALLS BOX ============ */
  .pitfalls {
    background: var(--slate-700);
    border: 1px solid var(--hairline-strong);
    padding: 18px 22px;
    margin: 24px 0;
    border-radius: 2px;
    position: relative;
  }
  .pitfalls::before {
    content: '⚠';
    position: absolute;
    top: -10px; left: 18px;
    background: var(--slate-800);
    color: var(--oxblood);
    padding: 0 6px;
    font-size: 14px;
  }
  .pitfalls .pitfalls-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--oxblood);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .pitfalls ul { margin: 0 0 0 20px; max-width: none; }
  .pitfalls li { margin-bottom: 8px; font-size: 15px; }
  .pitfalls code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--slate-900);
    padding: 1px 5px;
    font-size: 0.85em;
    color: var(--brass-bright);
    border-radius: 2px;
  }

  /* ============ CHALLENGES ============ */
  .challenge {
    background: var(--slate-700);
    border: 1px solid var(--hairline-strong);
    border-radius: 2px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .challenge-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 12px; gap: 12px; flex-wrap: wrap;
  }
  .challenge-title {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    color: var(--cream-100);
  }
  .challenge-difficulty {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    padding: 3px 10px;
    border: 1px solid var(--hairline-strong);
    color: var(--cream-400);
    border-radius: 2px;
  }
  .challenge-difficulty.beginner { color: var(--moss); border-color: var(--moss); }
  .challenge-difficulty.intermediate { color: var(--brass); border-color: var(--brass-dim); }
  .challenge-difficulty.advanced { color: var(--oxblood); border-color: var(--oxblood); }
  .challenge-prompt {
    font-family: 'Newsreader', serif;
    font-size: 16px;
    color: var(--cream-200);
    margin-bottom: 16px;
    line-height: 1.55;
  }
  .challenge-prompt code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--slate-900);
    color: var(--brass-bright);
    padding: 1px 5px;
    font-size: 0.85em;
    border-radius: 2px;
  }
  textarea.editor {
    width: 100%;
    min-height: 130px;
    background: var(--slate-900);
    border: 1px solid var(--hairline-strong);
    border-radius: 2px;
    padding: 14px;
    color: var(--cream-100);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.65;
    resize: vertical;
    tab-size: 2;
  }
  textarea.editor:focus { outline: none; border-color: var(--brass); }

  .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn {
    background: var(--brass);
    color: var(--slate-900);
    border: none;
    padding: 8px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--brass-bright); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.ghost { background: transparent; color: var(--cream-300); border: 1px solid var(--hairline-strong); }
  .btn.ghost:hover { color: var(--cream-100); border-color: var(--brass-dim); background: var(--slate-600); }
  .btn.subtle { background: transparent; color: var(--cream-400); border: none; padding: 8px 12px; }
  .btn.subtle:hover { color: var(--brass); }

  /* ============ RESULTS ============ */
  .result-block { margin-top: 16px; }
  .result-caption {
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--cream-400);
    margin-bottom: 8px;
    padding-left: 12px;
    border-left: 1px solid var(--hairline);
  }
  .result-caption strong { font-style: normal; color: var(--brass); font-family: 'Inter', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; margin-right: 8px; }
  .result-table-wrap {
    background: var(--slate-900);
    border: 1px solid var(--hairline);
    border-radius: 2px;
    overflow: auto;
    max-height: 360px;
  }
  table.results {
    width: 100%; border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
  }
  table.results thead { position: sticky; top: 0; }
  table.results th {
    background: var(--slate-800);
    color: var(--brass);
    font-weight: 600;
    text-align: left;
    padding: 9px 14px;
    border-bottom: 1px solid var(--hairline-strong);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  table.results td {
    padding: 8px 14px;
    border-bottom: 1px solid var(--hairline);
    color: var(--cream-200);
  }
  table.results tr:last-child td { border-bottom: none; }
  table.results .null { color: var(--cream-500); font-style: italic; }
  .result-error {
    padding: 14px 18px;
    background: rgba(181, 69, 77, 0.08);
    border: 1px solid var(--oxblood);
    color: #E89098;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    border-radius: 2px;
    border-left-width: 3px;
  }

  .feedback {
    margin-top: 14px;
    padding: 12px 16px;
    font-family: 'Newsreader', serif;
    font-size: 15px;
    border-radius: 2px;
  }
  .feedback.correct {
    background: rgba(111, 144, 114, 0.12);
    border-left: 3px solid var(--moss);
    color: #B5D6B7;
  }
  .feedback.correct .label { color: var(--moss); }
  .feedback.incorrect {
    background: rgba(181, 69, 77, 0.08);
    border-left: 3px solid var(--oxblood);
    color: #E89098;
  }
  .feedback em { color: inherit; }

  .reveal {
    margin-top: 14px;
    padding: 14px 18px;
    background: var(--slate-900);
    border: 1px solid var(--hairline);
    border-left: 2px solid var(--brass-dim);
    border-radius: 2px;
    font-size: 15px;
    color: var(--cream-200);
  }
  .reveal-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--brass);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .reveal pre.code { margin: 8px 0 0; border-left-width: 1px; }

  /* ============ NAV ============ */
  .lesson-nav {
    display: flex; justify-content: space-between; gap: 16px;
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--hairline);
  }
  .nav-link {
    display: flex; flex-direction: column;
    text-decoration: none; color: var(--cream-300);
    padding: 14px 18px;
    border: 1px solid var(--hairline-strong);
    border-radius: 2px;
    min-width: 220px;
    cursor: pointer;
    background: transparent;
    text-align: left;
    transition: all 0.15s;
    font-family: inherit;
  }
  .nav-link:hover { border-color: var(--brass); color: var(--cream-100); }
  .nav-link:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-link .label-small {
    font-family: 'Inter', sans-serif; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--cream-500); margin-bottom: 4px;
  }
  .nav-link .nav-title {
    font-family: 'Instrument Serif', serif;
    font-size: 18px; color: var(--cream-100);
  }
  .nav-link.next { text-align: right; align-items: flex-end; }

  /* ============ SANDBOX & SCHEMA ============ */
  .sandbox-panel, .schema-panel { max-width: 980px; margin: 0 auto; }
  .schema-tables { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 24px; }
  .schema-card {
    background: var(--slate-700);
    border: 1px solid var(--hairline-strong);
    padding: 16px 18px;
    border-radius: 2px;
  }
  .schema-card-name {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--brass);
    margin-bottom: 4px;
  }
  .schema-card-rows {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--cream-500);
    margin-bottom: 12px;
  }
  .schema-col {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--cream-200);
    padding: 4px 0;
    border-bottom: 1px solid var(--hairline);
    display: flex; justify-content: space-between;
  }
  .schema-col:last-child { border-bottom: none; }
  .schema-col .type { color: var(--cream-500); font-size: 11px; }
  .schema-col .pk { color: var(--brass); font-size: 10px; }

  /* ============ HOME ============ */
  .home-hero {
    padding: 60px 0 80px;
    text-align: left;
    max-width: 800px;
  }
  .home-hero .label { margin-bottom: 24px; display: inline-block; }
  .home-hero h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(48px, 7vw, 92px);
    line-height: 1.0;
    color: var(--cream-100);
    margin-bottom: 24px;
    letter-spacing: -0.02em;
    font-weight: 400;
  }
  .home-hero h1 em { color: var(--brass); }
  .home-hero .lede {
    font-size: 20px;
    line-height: 1.55;
    color: var(--cream-300);
    margin-bottom: 36px;
    max-width: 600px;
  }
  .home-modules {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1px; background: var(--hairline-strong);
    border: 1px solid var(--hairline-strong);
    margin-top: 48px;
  }
  .home-module {
    background: var(--slate-800);
    padding: 28px 26px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .home-module:hover { background: var(--slate-700); }
  .home-module-num {
    font-family: 'Instrument Serif', serif; font-style: italic;
    color: var(--brass); font-size: 18px;
    margin-bottom: 4px;
  }
  .home-module-name {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    color: var(--cream-100);
    margin-bottom: 8px;
    line-height: 1.15;
  }
  .home-module-desc {
    font-size: 15px;
    color: var(--cream-400);
    line-height: 1.5;
  }
  .home-module-lessons {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--cream-500);
    margin-top: 14px;
  }
  .home-section { margin-top: 80px; padding-top: 40px; border-top: 1px solid var(--hairline); }
  .home-section h2 {
    font-family: 'Instrument Serif', serif;
    font-size: 36px;
    color: var(--cream-100);
    margin-bottom: 20px;
  }
  .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 32px; margin-top: 32px; }
  .feature h3 {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--brass);
    margin-bottom: 8px;

      <div class="section">
        <h3>The Concept</h3>
        <div class="prose">
          <p>Most programming languages ask you <em>how</em>: how to walk the array, how to update the counter, how to construct the loop. SQL asks you <em>what</em>: what rows would you like back? The database figures out the how.</p>
          <p>This is called <strong>declarative</strong> programming, and it's the first mental shift to make. You don't iterate over rows; you describe a set of them, and the database materializes that set on your behalf. A skilled SQL writer thinks in sets, not in loops.</p>
          <div class="pull-quote">A query is a description of a set. The database's job is to find it.</div>
          <p>The smallest legal query has two clauses: <code>SELECT</code>, which lists the columns you want, and <code>FROM</code>, which names the table they live in. Together they form a complete sentence.</p>
        </div>
      </div>

        <h3>Worked Examples</h3>

        <div class="example-caption"><strong>Multiple columns</strong> Listed in the order you'd like them displayed. Commas separate them.</div>
        <pre class="code"><span class="kw">SELECT</span> * <span class="kw">FROM</span> heroes;</pre>
        <div class="example-caption"><strong>The wildcard</strong> An asterisk means "every column." Useful for exploring an unfamiliar table, but in production code, prefer naming columns explicitly.</div>
      </div>

          <p>So far every query has returned every row. That's rarely what you want. The <code>WHERE</code> clause acts as a sieve: only rows whose condition evaluates to <em>true</em> pass through.</p>
          <p>Conceptually, you can imagine the database walking each row and asking "does this one satisfy the condition?" Rows for which the answer is yes appear in the result. Rows for which the answer is no, or unknown (more on that shortly), are silently dropped.</p>
          <p>The comparison operators are mostly what you'd expect: <code>=</code>, <code>!=</code> (or <code>&lt;&gt;</code>), <code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code>. String literals go in single quotes; numbers do not.</p>

        <h3>Worked Examples</h3>
        <pre class="code"><span class="kw">SELECT</span> * <span class="kw">FROM</span> heroes <span class="kw">WHERE</span> class = <span class="str">'Mage'</span>;</pre>
        <div class="example-caption"><strong>Equality on a string</strong> Single quotes are mandatory for text. Double quotes mean something different (they refer to identifiers in standard SQL).</div>

          <p>The mental model is logical: a row passes the filter if the overall expression evaluates to true. <code>AND</code> requires both sides true. <code>OR</code> requires at least one side true. <code>NOT</code> inverts.</p>

        <h3>The Concept</h3>

          <p>The left table is preserved in full. For each of its rows, the database finds matches in the right table. If there are none, the right-side columns come back as <code>NULL</code> rather than the row being dropped.</p>
          <p><code>RIGHT JOIN</code> exists too — the mirror image — but it's rare in practice. By convention, put your "kept" table on the left and use <code>LEFT JOIN</code>. Most engineers go entire careers without writing a <code>RIGHT JOIN</code>.</p>

      <div class="section">
        <h3>The Concept</h3>
        <div class="prose">
          <p>A <em>subquery</em> is a query nested inside another query — usually in <code>WHERE</code>, sometimes in <code>FROM</code> or <code>SELECT</code>. The inner query runs first, produces a result, and the outer query uses that result as if it were a literal value.</p>
          <p>Three flavors are common. A <strong>scalar subquery</strong> returns a single value, useful for comparisons: <code>WHERE level &gt; (SELECT AVG(level) FROM heroes)</code>. A <strong>list subquery</strong> returns a single column of values, paired with <code>IN</code> or <code>NOT IN</code>. A <strong>table subquery</strong> returns a full result that you treat as a derived table in <code>FROM</code>.</p>
          <p>Subqueries are how you express ideas that can't be flattened into a single query. They're powerful, but they can become hard to read — which is why CTEs (next lesson) often supplant them.</p>
        </div>
      </div>

        <h3>Worked Examples</h3>
        <pre class="code"><span class="cmt">-- Scalar subquery: compare to an aggregate</span>

<span class="kw">FROM</span> heroes
<span class="kw">WHERE</span> level &gt; (<span class="kw">SELECT</span> <span class="fn">AVG</span>(level) <span class="kw">FROM</span> heroes);</pre>
        <div class="example-caption"><strong>Above-average heroes</strong> The inner query computes the average; the outer compares each row to it.</div>
        <pre class="code"><span class="cmt">-- List subquery: membership</span>
<span class="kw">SELECT</span> name
<span class="kw">FROM</span> heroes
<span class="kw">WHERE</span> id <span class="kw">IN</span> (
  <span class="kw">SELECT</span> winner_id <span class="kw">FROM</span> battles <span class="kw">WHERE</span> winner_id <span class="kw">IS NOT NULL</span>
);</pre>
        <div class="example-caption"><strong>Heroes who have ever won</strong> The inner query produces a list of winner IDs; the outer keeps heroes whose <code>id</code> is in that list.</div>
      </div>
      <div class="pitfalls">
        <div class="pitfalls-label">Common Pitfalls</div>
        <ul>
          <li><code>NOT IN</code> with a list that contains <code>NULL</code> returns no rows. This is one of SQL's nastiest surprises. Either filter nulls out of the subquery, or use <code>NOT EXISTS</code> instead.</li>

          <p>CTEs are not more powerful than subqueries — anything a CTE does, a subquery can do. But they are dramatically more <em>readable</em>. A query reads top-to-bottom: "first compute X, then compute Y using X, then use both to answer the real question." Subqueries, by contrast, read inside-out.</p>
          <div class="pull-quote">A CTE turns an inside-out subquery into a top-down narrative.</div>
          <p>You can chain multiple CTEs, separated by commas, and later CTEs can reference earlier ones. This is the standard way to express any non-trivial analytical query in modern SQL.</p>

    content: `
      <div class="section">
        <h3>The Concept</h3>
        <div class="prose">
          <p><code>GROUP BY</code> collapses rows. If you want per-class averages alongside the raw rows — keeping all 20 heroes visible but showing their class average next to each — <code>GROUP BY</code> can't help you. <strong>Window functions</strong> can.</p>
          <p>A window function computes a value across a "window" of related rows for each input row, without collapsing them. The query keeps its row count; you just gain additional columns.</p>
          <p>The window is defined by an <code>OVER</code> clause. <code>PARTITION BY</code> divides rows into groups (like <code>GROUP BY</code>, but non-collapsing). <code>ORDER BY</code> within the <code>OVER</code> imposes an order, which matters for ranking and running totals.</p>
          <div class="pull-quote">Window functions are the single biggest leap from "writing SQL" to "thinking in SQL."</div>
          <p>The common ones: <code>ROW_NUMBER()</code> assigns 1, 2, 3 with no ties. <code>RANK()</code> ties get the same rank, then skip. <code>DENSE_RANK()</code> ties get the same rank, no skip. <code>LAG()</code> and <code>LEAD()</code> peek at previous and next rows. The familiar aggregates (<code>SUM</code>, <code>AVG</code>) also work as windows, giving you running totals and moving averages.</p>
        </div>
      </div>
      <div class="section">
        <h3>Worked Examples</h3>
        <pre class="code"><span class="kw">SELECT</span> name, class, xp,
       <span class="fn">RANK</span>() <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> class <span class="kw">ORDER BY</span> xp <span class="kw">DESC</span>) <span class="kw">AS</span> class_rank
<span class="kw">FROM</span> heroes;</pre>
        <div class="example-caption"><strong>Ranking within groups</strong> Every hero is returned, but each now carries their rank within their class. The top mage gets <code>class_rank = 1</code>, second mage <code>= 2</code>, and so on.</div>
        <pre class="code"><span class="kw">SELECT</span> name, xp,
       <span class="fn">AVG</span>(xp) <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> class) <span class="kw">AS</span> class_avg_xp,
       xp - <span class="fn">AVG</span>(xp) <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> class) <span class="kw">AS</span> vs_class_avg
<span class="kw">FROM</span> heroes;</pre>
        <div class="example-caption"><strong>Aggregates as windows</strong> Each row shows its own xp, the class average, and the difference. Three numbers per hero — and the table still has all 20 rows.</div>
      </div>
      <div class="pitfalls">
        <div class="pitfalls-label">Common Pitfalls</div>
        <ul>
          <li>Putting <code>ORDER BY</code> in the wrong place. The <code>ORDER BY</code> inside <code>OVER()</code> orders the window; the trailing <code>ORDER BY</code> orders the final output. They serve different jobs.</li>
          <li>Trying to filter on a window function in <code>WHERE</code>. They aren't available there. Wrap the query in a CTE or subquery and filter outside.</li>
          <li>Confusing <code>RANK</code> and <code>ROW_NUMBER</code>. With ties, they produce different results. Pick deliberately.</li>
        </ul>
      </div>
    `,
    challenges: [
      {
        prompt: "For every hero, return <code>name</code>, <code>class</code>, <code>xp</code>, and a column <code>class_rank</code> giving their rank within their class by <code>xp</code> descending (the highest-xp hero in each class is rank 1).",
        difficulty: 'intermediate',
        starter: "SELECT name, class, xp,\n  RANK() OVER (PARTITION BY  ORDER BY  ) AS class_rank\nFROM heroes;",
        hint: "PARTITION BY class, ORDER BY xp DESC.",
        solution: "SELECT name, class, xp, RANK() OVER (PARTITION BY class ORDER BY xp DESC) AS class_rank FROM heroes;",
        check: (rows, cols) => {
          if (!cols.includes('class_rank') || rows.length !== 20) return false;
          const byClass = {};
          rows.forEach(r => { byClass[r.class] = byClass[r.class] || []; byClass[r.class].push(r); });
          return Object.values(byClass).every(cls => {
            const sorted = [...cls].sort((a,b) => b.xp - a.xp);

          });

        solution: "SELECT name, level, MAX(level) OVER (PARTITION BY class) - level AS level_diff_from_class_max FROM heroes;",
        check: (rows, cols) => cols.includes('level_diff_from_class_max') && rows.length === 20 && rows.some(r => r.level_diff_from_class_max === 0) && rows.every(r => r.level_diff_from_class_max >= 0)
      }
    ]
  },
  {
    module: 4, number: 'XVI', title: 'Putting It Together',
    subtitle: 'A real analytical query, end to end.',
    content: `
      <div class="section">
        <h3>The Concept</h3>
        <div class="prose">
          <p>Every lesson so far has introduced one tool. The final test is composition: using several together to answer a question worth asking. This is what working analysts and engineers do all day.</p>
          <p>A well-structured analytical query usually has shape: CTEs at the top to compute intermediate results, joins in the middle to combine them, aggregates and windows to shape the answer, and an <code>ORDER BY</code> at the end to present it. Reading top-to-bottom, the query tells the story of how it was derived.</p>
          <p>The challenge below is the kind of question someone would actually pose: <em>who are our most valuable heroes, weighted by both their experience and their contribution?</em> No single clause answers it. You'll compose three or four together.</p>
          <div class="pull-quote">The query is the question, written carefully enough that a machine can answer it.</div>
        </div>
      </div>
      <div class="section">
        <h3>A Worked Walkthrough</h3>
        <div class="prose">
          <p>Question: <em>Show the top three heroes per class by total quest reward gold earned, with their xp and rank within class.</em></p>
        </div>
        <pre class="code"><span class="kw">WITH</span> earnings <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    h.id, h.name, h.class, h.xp,
    <span class="fn">SUM</span>(q.reward_gold) <span class="kw">AS</span> gold_earned
  <span class="kw">FROM</span> heroes h
  <span class="kw">INNER JOIN</span> hero_quests hq <span class="kw">ON</span> h.id = hq.hero_id
  <span class="kw">INNER JOIN</span> quests q       <span class="kw">ON</span> hq.quest_id = q.id
  <span class="kw">GROUP BY</span> h.id
),
ranked <span class="kw">AS</span> (
  <span class="kw">SELECT</span> *,
    <span class="fn">RANK</span>() <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> class <span class="kw">ORDER BY</span> gold_earned <span class="kw">DESC</span>) <span class="kw">AS</span> class_rank
  <span class="kw">FROM</span> earnings
)
<span class="kw">SELECT</span> name, class, xp, gold_earned, class_rank
<span class="kw">FROM</span> ranked
<span class="kw">WHERE</span> class_rank &lt;= <span class="num">3</span>
<span class="kw">ORDER BY</span> class, class_rank;</pre>
        <div class="example-caption"><strong>Anatomy</strong> First CTE: join through to aggregate gold per hero. Second CTE: rank within class. Final SELECT: filter to top 3 and present. Reads like an essay: setup, analysis, conclusion.</div>

    `,
    challenges: [
      {
        prompt: "Find each <strong>guild</strong>'s total quest earnings — the sum of <code>reward_gold</code> across all quests completed by all heroes belonging to that guild. Return guild <code>name</code> (as <code>guild_name</code>) and <code>total_gold</code>, sorted highest first.",
        difficulty: 'advanced',
        starter: "SELECT g.name AS guild_name, SUM(q.reward_gold) AS total_gold\nFROM guilds g\nINNER JOIN heroes h ON \nINNER JOIN hero_quests hq ON \nINNER JOIN quests q ON \nGROUP BY \nORDER BY ",
        hint: "Three joins: guilds→heroes→hero_quests→quests. GROUP BY g.id. ORDER BY total_gold DESC.",
        solution: "SELECT g.name AS guild_name, SUM(q.reward_gold) AS total_gold FROM guilds g INNER JOIN heroes h ON g.id = h.guild_id INNER JOIN hero_quests hq ON h.id = hq.hero_id INNER JOIN quests q ON hq.quest_id = q.id GROUP BY g.id ORDER BY total_gold DESC;",

  },

let db, mode = 'home', currentLesson = null;
let completed = new Set();
let savedEditors = {};
let revealedHints = new Set();
let revealedSolutions = new Set();
let sandboxQuery = `-- Welcome to the sandbox.
-- Query any of: heroes, guilds, quests, hero_quests, items, hero_items, battles.

SELECT name, class, level FROM heroes ORDER BY level DESC LIMIT 5;`;

const STORAGE_KEY = 'sql-atelier-v3';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      completed = new Set(data.completed || []);
      savedEditors = data.savedEditors || {};
      sandboxQuery = data.sandboxQuery || sandboxQuery;
    }
  } catch(e) {}
}
function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completed: [...completed], savedEditors, sandboxQuery
    }));
  } catch(e) {}
}

async function init() {
  const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
  db = new SQL.Database();
  db.exec(SCHEMA_SQL);
  loadProgress();
  render();
}

function updateProgressMeter() {
  const meter = document.getElementById('progress-meter');
  if (mode === 'home') { meter.style.display = 'none'; return; }
  meter.style.display = 'flex';
  document.getElementById('progress-text').textContent = `${completed.size} of ${lessons.length}`;
  document.getElementById('meter-fill').style.width = `${100 * completed.size / lessons.length}%`;
}

function setMode(m, lessonIdx) {
  mode = m;
  if (lessonIdx !== undefined) currentLesson = lessonIdx;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  if (m === 'home' || m === 'lesson') document.getElementById('tab-home').classList.add('active');
  else document.getElementById('tab-' + m).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function render() {
  updateProgressMeter();
  const app = document.getElementById('app');
  app.className = '';
  if (mode === 'home') renderHome(app);
  else if (mode === 'lesson') renderLesson(app);
  else if (mode === 'sandbox') renderSandbox(app);
  else if (mode === 'schema') renderSchema(app);
}

function onEditorInput(ci) {
  const key = `${currentLesson}-${ci}`;
  savedEditors[key] = document.getElementById(`editor-${ci}`).value;
  saveProgress();
}

function resetChallenge(ci) {
  const key = `${currentLesson}-${ci}`;
  delete savedEditors[key];
  saveProgress();
  document.getElementById(`editor-${ci}`).value = lessons[currentLesson].challenges[ci].starter;
  document.getElementById(`output-${ci}`).innerHTML = '';
}

function toggleHint(ci) {
  const box = document.getElementById(`hint-${ci}`);
  if (box.innerHTML) { box.innerHTML = ''; return; }
  const ch = lessons[currentLesson].challenges[ci];
  box.innerHTML = `<div class="reveal"><div class="reveal-label">Hint</div>${ch.hint}</div>`;
}

function toggleSolution(ci) {
  const box = document.getElementById(`solution-${ci}`);
  if (box.innerHTML) { box.innerHTML = ''; return; }
  const ch = lessons[currentLesson].challenges[ci];
  box.innerHTML = `<div class="reveal"><div class="reveal-label">Reference solution</div><pre class="code">${highlightSql(ch.solution)}</pre></div>`;
}

function runChallenge(ci) {
  const sql = document.getElementById(`editor-${ci}`).value;
  const output = document.getElementById(`output-${ci}`);
  try {
    const results = db.exec(sql);
    if (results.length === 0) {
      output.innerHTML = `<div class="result-block"><div class="result-caption"><strong>Fig.</strong> Query ran. No rows returned.</div></div>`;
      return;
    }
    const { columns, values } = results[0];
    const rows = values.map(row => Object.fromEntries(columns.map((c, i) => [c, row[i]])));
    let html = renderResultTable(columns, values, `${currentLesson + 1}.${ci + 1}`);
    let ok = false;
    try { ok = lessons[currentLesson].challenges[ci].check(rows, columns); } catch(e) { ok = false; }
    if (ok) {
      if (!completed.has(currentLesson)) {
        completed.add(currentLesson);
        saveProgress();
        updateProgressMeter();
        // re-mark sidebar
        document.querySelectorAll('.toc-lesson').forEach((el, idx) => {
          if (idx === currentLesson) el.classList.add('done');
        });
      }
      html += `<div class="feedback correct"><span class="label">Correct</span> &nbsp;Well reasoned. The result matches the expected set.</div>`;
    } else {
      html += `<div class="feedback incorrect"><span class="label">Not quite</span> &nbsp;The query ran without errors, but the result doesn't match what the challenge asked for. Try again, or reveal a hint.</div>`;
    }
    output.innerHTML = html;
  } catch (e) {
    output.innerHTML = `<div class="result-block"><div class="result-error">${escapeHtml(e.message)}</div></div>`;
  }
}

function renderSchema(app) {
  const tableNames = ['heroes', 'guilds', 'quests', 'hero_quests', 'items', 'hero_items', 'battles'];
  const cardsHtml = tableNames.map(t => {
    const info = db.exec(`PRAGMA table_info(${t});`)[0];
    const count = db.exec(`SELECT COUNT(*) FROM ${t};`)[0].values[0][0];
    const cols = info.values.map(r => `
      <div class="schema-col">
        <span>${r[1]} ${r[5] ? '<span class="pk">PK</span>' : ''}</span>
        <span class="type">${r[2].toLowerCase()}</span>
      </div>
    `).join('');
    return `<div class="schema-card">
      <div class="schema-card-name">${t}</div>
      <div class="schema-card-rows">${count} rows</div>
      ${cols}
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="schema-panel">
      <div class="lesson-header">
        <div class="lesson-eyebrow"><span class="label">The Database</span><div class="divider"></div></div>
        <div class="lesson-title">Schema</div>
        <div class="lesson-subtitle">The fantasy-world ledger you're querying throughout the course.</div>
      </div>
      <div class="schema-tables">${cardsHtml}</div>
      <div class="section" style="margin-top: 40px;">
        <h3>Foreign-key relationships</h3>

          <p><code>heroes.guild_id</code> &rarr; <code>guilds.id</code></p>
          <p><code>hero_quests.hero_id</code> &rarr; <code>heroes.id</code> &nbsp;·&nbsp; <code>hero_quests.quest_id</code> &rarr; <code>quests.id</code></p>
          <p><code>hero_items.hero_id</code> &rarr; <code>heroes.id</code> &nbsp;·&nbsp; <code>hero_items.item_id</code> &rarr; <code>items.id</code></p>
          <p><code>battles.attacker_id</code>, <code>battles.defender_id</code>, <code>battles.winner_id</code> &rarr; <code>heroes.id</code></p>
        </div>
      </div>
    </div>
  `;
}

function renderResultTable(columns, values, figNum) {
  return `<div class="result-block">
    <div class="result-caption"><strong>Fig. ${figNum}</strong> ${values.length} row${values.length === 1 ? '' : 's'} returned.</div>
    <div class="result-table-wrap"><table class="results">
      <thead><tr>${columns.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr></thead>
      <tbody>${values.map(r => '<tr>' + r.map(v =>
        v === null ? '<td class="null">NULL</td>' : `<td>${escapeHtml(String(v))}</td>`
      ).join('') + '</tr>').join('')}</tbody>
    </table></div>
  </div>`;
}

function highlightSql(sql) {
  const keywords = /\b(SELECT|FROM|WHERE|AND|OR|NOT|IN|LIKE|BETWEEN|IS|NULL|GROUP BY|HAVING|ORDER BY|LIMIT|JOIN|INNER|LEFT|RIGHT|OUTER|ON|AS|DISTINCT|WITH|UNION|ALL|ASC|DESC|PARTITION BY|OVER|CASE|WHEN|THEN|ELSE|END)\b/gi;
  const funcs = /\b(COUNT|SUM|AVG|MIN|MAX|RANK|ROW_NUMBER|DENSE_RANK|LAG|LEAD|COALESCE|NULLIF)\b/gi;
  return escapeHtml(sql)
    .replace(/--[^\n]*/g, m => `<span class="cmt">${m}</span>`)
    .replace(/'([^']*)'/g, (m, s) => `<span class="str">'${s}'</span>`)
    .replace(/\b(\d+)\b/g, '<span class="num">$1</span>')
    .replace(funcs, '<span class="fn">$1</span>')
    .replace(keywords, '<span class="kw">$1</span>');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

init();
</script>
